<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Atlas</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2024%2024'%3E%3Ccircle%20cx='12'%20cy='12'%20r='9.2'%20fill='none'%20stroke='%23d4a94f'%20stroke-width='1'/%3E%3Cpath%20d='M12%202.5%20L13.4%2010.6%20L21.5%2012%20L13.4%2013.4%20L12%2021.5%20L10.6%2013.4%20L2.5%2012%20L10.6%2010.6%20Z'%20fill='%23d4a94f'/%3E%3C/svg%3E">
<script>
  /* Apply persisted theme before first paint to avoid a flash. */
  (function(){
    try{
      var t = localStorage.getItem("atlas-theme");
      if(t === "light") document.documentElement.setAttribute("data-theme", "light");
    }catch(e){}
  })();
</script>
<style>
  /* ---- Session Atlas identity (BRAND-SPEC): night chart (dark, default) ---- */
  :root{
    color-scheme:dark;
    --bg:#0b1020;                 /* deep space-navy ink */
    --panel:#121831;              /* chart panel */
    --panel-2:#1a2244;            /* raised panel / hover */
    --border:#26304f;             /* desaturated indigo */
    --text:#dde3f0;               /* starlight off-white */
    --muted:#8a93ad;
    --accent:#d4a94f;             /* atlas gold — primary actions, wordmark, focus */
    --accent-rgb:212,169,79;
    --accent2:#4fd4c5;            /* meridian teal — links, edges, streaming */
    --accent2-rgb:79,212,197;
    --on-accent:#0b1020;          /* ink on gold */
    --on-accent-dim:rgba(11,16,32,.62);
    --on-accent-code:rgba(11,16,32,.20);
    --hud-bg:rgba(18,24,49,.85);
    --overlay-bg:rgba(6,9,20,.82);
    --error:#f0736b;
    --error-bg:#4a1c1f;
    --error-tint:rgba(240,115,107,.13);
    --ok:#5ec98a;
    --header-bg:rgba(14,19,40,.74);
    --shadow:rgba(0,0,0,.55);
  }
  /* ---- parchment map (light) ---- */
  :root[data-theme="light"]{
    color-scheme:light;
    --bg:#f6f1e7;                 /* warm paper */
    --panel:#fdfaf3;
    --panel-2:#efe8d8;
    --border:#d8cfba;
    --text:#2b2820;               /* ink */
    --muted:#726b57;
    --accent:#a07c28;             /* gold darkened for contrast */
    --accent-rgb:160,124,40;
    --accent2:#1f8f83;            /* teal darkened */
    --accent2-rgb:31,143,131;
    --on-accent:#fdfaf3;
    --on-accent-dim:rgba(253,250,243,.82);
    --on-accent-code:rgba(253,250,243,.28);
    --hud-bg:rgba(253,250,243,.9);
    --overlay-bg:rgba(43,40,32,.4);
    --error:#b23a30;
    --error-bg:#f6e2de;
    --error-tint:rgba(178,58,48,.10);
    --ok:#3d7a45;
    --header-bg:rgba(246,241,231,.85);
    --shadow:rgba(120,110,88,.35);
  }
  html{scrollbar-color:var(--border) var(--bg);scrollbar-width:thin;}
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    display:flex;flex-direction:column;height:100vh;overflow:hidden;
    background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    font-size:14px;
  }
  button, input{font-family:inherit;}

  /* ---------- header ---------- */
  .header{
    flex:0 0 auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    padding:10px 16px;background:var(--header-bg);border-bottom:1px solid var(--border);
    backdrop-filter:blur(10px) saturate(1.3);-webkit-backdrop-filter:blur(10px) saturate(1.3);
    position:relative;z-index:10;
  }
  .wordmark{font-weight:800;letter-spacing:1.5px;color:var(--accent);font-size:15px;white-space:nowrap;display:inline-flex;align-items:center;gap:8px;}
  .wordmark-glyph{flex:0 0 auto;display:block;}
  .icon-btn{
    background:var(--bg);border:1px solid var(--border);color:var(--text);
    border-radius:6px;padding:6px 10px;cursor:pointer;font-size:12px;white-space:nowrap;
    display:inline-flex;align-items:center;gap:6px;line-height:1;
  }
  .icon-btn:hover{border-color:var(--accent);color:var(--accent);}
  .palette-hint kbd{
    background:var(--panel-2);border:1px solid var(--border);border-radius:4px;
    padding:1px 5px;font-size:10px;font-family:inherit;color:var(--muted);
  }
  .stats{color:var(--muted);font-size:12px;white-space:nowrap;}
  #searchInput{
    background:var(--bg);border:1px solid var(--border);color:var(--text);
    border-radius:6px;padding:6px 10px;font-size:13px;flex:1 1 160px;min-width:140px;max-width:320px;
  }
  #searchInput:focus{outline:none;border-color:var(--accent);}
  .slider-group{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);white-space:nowrap;}
  .slider-group input[type=range]{accent-color:var(--accent);width:120px;}
  .slider-group span.val{color:var(--text);min-width:34px;display:inline-block;}
  #refreshBtn{
    background:var(--bg);border:1px solid var(--border);color:var(--text);
    border-radius:6px;padding:6px 14px;cursor:pointer;font-size:12px;
  }
  #refreshBtn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
  #refreshBtn:disabled{opacity:.5;cursor:default;}
  .tabs{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap;}
  .tab-btn{
    background:transparent;border:1px solid var(--border);color:var(--muted);
    padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;
  }
  .tab-btn:hover:not(.active){color:var(--text);border-color:var(--accent);}
  .tab-btn.active{background:var(--accent);color:var(--on-accent);border-color:var(--accent);font-weight:700;}

  /* ---------- main / views ---------- */
  .main{flex:1 1 auto;position:relative;overflow:hidden;}
  .view{position:absolute;inset:0;display:none;overflow:hidden;}
  .view.active{display:flex;flex-direction:column;}

  /* Tiles */
  .cluster-grid{
    flex:1 1 auto;overflow-y:auto;padding:16px;
    display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;align-content:start;
  }
  .cluster-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:10px;}
  .cluster-card-header{display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px;}
  .cluster-dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto;}
  .badge{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:1px 8px;font-size:11px;color:var(--muted);margin-left:auto;}
  .chip-list{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{
    background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 8px;
    font-size:12px;cursor:pointer;max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .chip:hover{border-color:var(--accent);color:var(--accent);}
  .chip .chip-time{color:var(--muted);margin-left:6px;font-size:11px;}

  /* Tree */
  .tree-container{flex:1 1 auto;overflow:auto;padding:16px;}
  .tree-container details{margin-bottom:2px;}
  .tree-container summary{cursor:pointer;padding:5px 8px;border-radius:4px;list-style:revert;font-size:13px;}
  .tree-container summary:hover{background:var(--panel);}
  .tree-session{
    padding:4px 8px 4px 30px;font-size:12px;cursor:pointer;border-radius:4px;color:var(--text);
    display:flex;justify-content:space-between;gap:8px;
  }
  .tree-session:hover{background:var(--panel);color:var(--accent);}

  /* Graph */
  /* NOTE: keep position:absolute (matching .view) so the view fills #main and
     is a containing block for the canvas/legend/HUD. A position:relative here
     collapses the view to 0 height (all children are absolute), clipping them. */
  #viewGraph{position:absolute;inset:0;}
  #graphCanvas{position:absolute;inset:0;width:100%;height:100%;cursor:grab;display:block;}
  #graphCanvas.dragging{cursor:grabbing;}
  .graph-hud{
    position:absolute;left:12px;bottom:12px;background:var(--hud-bg);
    border:1px solid var(--border);padding:6px 10px;border-radius:6px;font-size:11px;color:var(--muted);
    pointer-events:none;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  }
  .graph-hint{
    position:absolute;left:12px;bottom:40px;color:var(--muted);font-size:11px;
    padding:2px 4px;pointer-events:none;opacity:.85;letter-spacing:.2px;
  }
  /* cluster legend — styled as a map legend */
  .graph-legend{
    position:absolute;top:12px;right:12px;width:230px;max-height:calc(100% - 24px);
    background:var(--hud-bg);border:1px solid var(--border);border-radius:8px;
    display:flex;flex-direction:column;overflow:hidden;z-index:5;
    box-shadow:0 6px 24px var(--shadow);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);
  }
  .graph-legend-head{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:8px 10px 7px;border-top:2px solid var(--accent);
  }
  .graph-legend-title{
    font-size:11px;font-weight:700;color:var(--text);text-transform:uppercase;
    letter-spacing:1.2px;
  }
  .graph-legend-toggle{
    background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;line-height:1;padding:0 4px;
  }
  .graph-legend-toggle:hover{color:var(--accent);}
  .graph-legend.collapsed .graph-legend-body{display:none;}
  .graph-legend-body{overflow-y:auto;padding:4px;}
  .legend-row{
    display:flex;align-items:center;gap:8px;padding:5px 7px;border-radius:6px;cursor:pointer;font-size:12px;
  }
  .legend-row:hover{background:var(--panel-2);}
  .legend-row.active{background:var(--panel-2);box-shadow:inset 2px 0 0 0 var(--accent);}
  .legend-row .cluster-dot{width:11px;height:11px;box-shadow:0 0 6px currentColor;}
  .legend-label{flex:1 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);}
  .legend-size{flex:0 0 auto;color:var(--muted);font-size:11px;}
  .legend-more{padding:6px 8px;font-size:11px;color:var(--muted);cursor:pointer;border-radius:6px;}
  .legend-more:hover{color:var(--accent);background:var(--panel-2);}

  /* Fusion */
  .fusion-controls{
    flex:0 0 auto;padding:10px 16px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted);
  }
  .fusion-list{flex:1 1 auto;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;}
  .fusion-group{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;}
  .fusion-members{display:flex;flex-direction:column;gap:2px;margin:8px 0;}
  .fusion-member{
    font-size:12px;display:flex;justify-content:space-between;gap:8px;cursor:pointer;
    padding:3px 4px;border-radius:4px;
  }
  .fusion-member:hover{background:var(--bg);color:var(--accent);}
  .proposal-box{background:var(--bg);border:1px dashed var(--border);border-radius:6px;padding:8px;margin-top:8px;font-size:12px;color:var(--muted);}
  .copy-btn{
    background:var(--panel);border:1px solid var(--border);color:var(--text);
    border-radius:4px;padding:3px 10px;cursor:pointer;font-size:11px;
  }
  .copy-btn:hover{border-color:var(--accent);color:var(--accent);}
  .term-tag{
    display:inline-block;background:var(--bg);border:1px solid var(--border);border-radius:4px;
    padding:2px 6px;font-size:11px;margin:2px 4px 2px 0;color:var(--text);
  }

  /* Detail panel */
  .detail-panel{
    position:absolute;top:0;right:-380px;width:360px;max-width:92vw;height:100%;
    background:var(--panel);border-left:1px solid var(--border);
    transition:right .18s ease;overflow-y:auto;z-index:30;box-shadow:-6px 0 24px var(--shadow);
  }
  .detail-panel.open{right:0;}
  .detail-header{
    display:flex;align-items:center;justify-content:space-between;padding:12px 14px;
    border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel);z-index:1;
  }
  .close-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:4px;}
  .close-btn:hover{color:var(--text);}
  .detail-body{padding:14px;font-size:13px;line-height:1.55;}
  .detail-row{margin-bottom:12px;}
  .detail-label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;}
  .neighbor-row{
    display:flex;justify-content:space-between;gap:8px;padding:5px 2px;border-bottom:1px solid var(--border);
    cursor:pointer;font-size:12px;
  }
  .neighbor-row:hover{color:var(--accent);}
  .resume-box{
    display:flex;gap:6px;align-items:center;background:var(--bg);border:1px solid var(--border);
    border-radius:6px;padding:6px 8px;margin-top:4px;
  }
  .resume-box code{flex:1;overflow-x:auto;white-space:nowrap;font-family:ui-monospace,"Cascadia Code","SF Mono",Consolas,monospace;font-size:11px;}

  /* Node story panel (graph clicks) */
  .story-lead{font-size:13px;line-height:1.6;margin-bottom:14px;color:var(--text);}
  .story-lead strong{color:var(--accent);}
  .story-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .story-btn{
    background:var(--panel-2);border:1px solid var(--border);color:var(--text);
    border-radius:6px;padding:6px 11px;cursor:pointer;font-size:12px;
  }
  .story-btn:hover{border-color:var(--accent);color:var(--accent);}
  .story-btn.primary{background:var(--accent);color:var(--on-accent);border-color:var(--accent);font-weight:600;}
  .story-btn.primary:hover{opacity:.9;color:var(--on-accent);}
  .story-conn{
    padding:7px 4px;border-bottom:1px solid var(--border);cursor:pointer;
  }
  .story-conn:hover{background:var(--panel-2);}
  .story-conn-top{display:flex;justify-content:space-between;gap:8px;font-size:12px;align-items:baseline;}
  .story-conn-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);}
  .story-conn:hover .story-conn-title{color:var(--accent);}
  .story-conn-w{flex:0 0 auto;color:var(--muted);font-size:11px;font-variant-numeric:tabular-nums;}
  .story-conn-bar{height:3px;border-radius:2px;background:var(--border);margin:5px 0 4px;overflow:hidden;}
  .story-conn-bar>span{display:block;height:100%;background:var(--accent2);}
  .story-conn-terms{font-size:11px;color:var(--muted);}
  .story-conn-terms b{color:var(--accent2);font-weight:600;}

  /* Error overlay */
  #errorOverlay{
    position:fixed;inset:0;background:var(--overlay-bg);display:none;
    align-items:center;justify-content:center;z-index:100;flex-direction:column;
    backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  }
  #errorOverlay.show{display:flex;}
  .error-box{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:26px 32px;text-align:center;max-width:420px;}
  .error-box #errorMessage{color:var(--text);margin-bottom:14px;font-size:13px;}
  .retry-btn{background:var(--accent);color:var(--on-accent);border:none;border-radius:6px;padding:8px 20px;cursor:pointer;font-weight:700;font-size:13px;}
  .retry-btn:hover{opacity:.9;}

  /* ---------- Chat ---------- */
  .chat-layout{flex:1 1 auto;display:flex;overflow:hidden;min-height:0;position:relative;}
  .chat-sidebar{
    width:300px;flex:0 0 300px;display:flex;flex-direction:column;
    border-right:1px solid var(--border);overflow:hidden;background:var(--panel);
  }
  .chat-sidebar-toggle{
    display:none;position:absolute;left:10px;top:9px;z-index:16;
    background:var(--panel);border:1px solid var(--border);color:var(--text);
    border-radius:6px;padding:5px 11px;cursor:pointer;font-size:15px;line-height:1;
    box-shadow:0 2px 8px var(--shadow);
  }
  .chat-sidebar-toggle:hover{border-color:var(--accent);color:var(--accent);}
  .chat-scrim{display:none;position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:15;}
  .chat-scrim.show{display:block;}
  #chatSearchInput{
    margin:10px 10px 6px 10px;background:var(--bg);border:1px solid var(--border);color:var(--text);
    border-radius:6px;padding:6px 10px;font-size:13px;
  }
  #chatSearchInput:focus{outline:none;border-color:var(--accent);}
  #newSessionBtn{
    margin:0 10px 8px 10px;background:var(--bg);border:1px solid var(--border);color:var(--text);
    border-radius:6px;padding:7px 10px;cursor:pointer;font-size:12px;text-align:left;
  }
  #newSessionBtn:hover{border-color:var(--accent);color:var(--accent);}
  .new-session-panel{
    margin:0 10px 10px 10px;padding:10px;background:var(--bg);border:1px solid var(--border);
    border-radius:6px;display:flex;flex-direction:column;gap:8px;font-size:11px;color:var(--muted);
  }
  .new-session-panel label{display:flex;flex-direction:column;gap:3px;}
  .new-session-panel select, .new-session-panel input[type=text]{
    background:var(--panel);border:1px solid var(--border);color:var(--text);
    border-radius:4px;padding:5px 7px;font-size:12px;font-family:inherit;
  }
  .chat-session-list{flex:1 1 auto;overflow-y:auto;padding:0 6px 10px 6px;}
  .chat-filter-banner{
    display:flex;align-items:center;justify-content:space-between;gap:6px;
    background:var(--bg);border:1px solid var(--border);border-radius:6px;
    padding:6px 8px;margin:0 4px 8px 4px;font-size:11px;color:var(--muted);
  }
  .chat-cluster-group{margin-bottom:10px;}
  .chat-cluster-header{
    display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.4px;padding:4px 6px;
  }
  .chat-session-item{
    display:flex;justify-content:space-between;gap:8px;padding:7px 9px;border-radius:6px;
    font-size:12px;cursor:pointer;transition:background .1s,box-shadow .1s;
    box-shadow:inset 0 0 0 0 var(--accent);
  }
  .chat-session-item:hover{background:var(--bg);color:var(--accent);box-shadow:inset 2px 0 0 0 var(--accent);}
  .chat-session-item.active{background:var(--accent);color:var(--on-accent);}
  .chat-session-item.active .chip-time{color:var(--on-accent-dim);}
  .chat-main{flex:1 1 auto;display:flex;flex-direction:column;overflow:hidden;min-width:0;position:relative;}
  .chat-banner{
    flex:0 0 auto;background:var(--error-bg);border-bottom:1px solid var(--error);color:var(--error);
    padding:8px 14px;font-size:12px;
  }
  .chat-transcript{flex:1 1 auto;overflow-y:auto;padding:16px;display:flex;flex-direction:column;}
  .chat-system-line{
    align-self:center;color:var(--muted);font-size:11px;background:var(--panel);
    border:1px solid var(--border);border-radius:10px;padding:3px 10px;margin:6px 0;
  }
  .chat-composer{
    flex:0 0 auto;display:flex;gap:8px;align-items:flex-end;padding:10px 14px;
    border-top:1px solid var(--border);background:var(--panel);position:relative;
  }
  .chat-composer textarea{
    flex:1 1 auto;resize:none;background:var(--bg);border:1px solid var(--border);color:var(--text);
    border-radius:6px;padding:8px 10px;font-size:13px;font-family:inherit;line-height:1.4;
  }
  .chat-composer textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(var(--accent-rgb),.25);}
  .chat-composer textarea:disabled{opacity:.5;}
  #chatSendBtn{
    background:var(--accent);color:var(--on-accent);border:none;border-radius:6px;
    padding:8px 18px;cursor:pointer;font-weight:700;font-size:13px;min-width:74px;
  }
  #chatSendBtn:disabled{opacity:.5;cursor:default;}
  #chatSendBtn.stop{background:var(--error);color:#fff;}
  .skill-autocomplete{
    position:absolute;left:14px;right:14px;bottom:100%;margin-bottom:6px;
    background:var(--panel);border:1px solid var(--border);border-radius:8px;
    max-height:220px;overflow-y:auto;box-shadow:0 -6px 20px rgba(0,0,0,.45);z-index:5;
  }
  .skill-ac-item{padding:7px 10px;font-size:12px;cursor:pointer;display:flex;gap:8px;align-items:baseline;}
  .skill-ac-item span{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .skill-ac-item:hover, .skill-ac-item.active{background:var(--bg);}

  /* message turn groups + avatars */
  .msg-row{display:flex;gap:9px;align-items:flex-start;margin-bottom:14px;max-width:100%;}
  .msg-row.user{flex-direction:row-reverse;}
  .msg-avatar{
    flex:0 0 auto;width:27px;height:27px;border-radius:50%;margin-top:1px;
    display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;letter-spacing:.3px;
  }
  .msg-avatar.assistant{background:var(--panel-2);border:1px solid var(--border);color:var(--accent);}
  .msg-avatar.user{background:var(--accent);color:var(--on-accent);}
  .msg-col{display:flex;flex-direction:column;gap:6px;min-width:0;max-width:min(80%,760px);}
  .msg-row.user .msg-col{align-items:flex-end;}
  .msg-col>.tool-chip,.msg-col>.md-thinking{align-self:stretch;}

  .msg-row.user .md-rendered code{background:var(--on-accent-code);}

  .palette-input{
    border:none;border-bottom:1px solid var(--border);background:var(--bg);color:var(--text);

  .palette-sec{
    flex:0 0 auto;font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);

  .palette-sub{color:var(--muted);font-size:11px;margin-left:6px;}
  .palette-empty{padding:18px;color:var(--muted);font-size:13px;text-align:center;}

  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:5px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--muted);}

  /* ---------- responsive ---------- */

(function(){

  // ---------- utils ----------
  function $(id){ return document.getElementById(id); }

  function escapeHtml(str){

  function fmtRelative(iso){
    var t = new Date(iso).getTime();

    var sec = Math.floor(diff / 1000);
    if(sec < 0) sec = 0;
    if(sec < 60) return "just now";
    var min = Math.floor(sec / 60);
    if(min < 60) return min + "m ago";
    var hr = Math.floor(min / 60);

    var day = Math.floor(hr / 24);

    var mo = Math.floor(day / 30);

    // [text](url) — only http/https schemes; the escaped ':' '/' survive so the
    // scheme test still works, and no other scheme (javascript:, data:) matches.
    s = s.replace(/\[([^\]\n]+)\]\(([^)\s]+)\)/g, function(m, txt, url){
      if(/^https?:\/\//i.test(url)){
        return '<a href="' + url + '" target="_blank" rel="noopener noreferrer">' + txt + "</a>";
      }
      return m;
    });
    s = s.replace(/\*\*([^*\n]+?)\*\*/g, "<strong>$1</strong>");
    s = s.replace(/\*([^*\n]+?)\*/g, "<em>$1</em>");
    s = s.replace(/(^|[\s(])_([^_\n]+?)_(?=$|[\s).,!?;:])/g, "$1<em>$2</em>");
    s = s.replace(new RegExp(NUL + "C(\\d+)" + NUL, "g"), function(_, i){
      return "<code>" + codes[parseInt(i, 10)] + "</code>";
    });
    return s;
  }

  function renderMarkdown(raw){
    var text = escapeHtml(raw == null ? "" : raw);
    var fences = [];
    text = text.replace(/```([a-zA-Z0-9_+.\-]*)[ \t]*\n?([\s\S]*?)```/g, function(_, lang, code){
      code = code.replace(/\n$/, "");
      var idx = fences.length;
      var label = escapeHtml(lang || "code");
      fences.push(
        '<div class="md-code"><div class="md-code-head"><span class="md-code-lang">' + label +
        '</span><button type="button" class="md-copy" title="Copy code">Copy</button></div>' +
        '<pre class="md-fence"><code>' + code + "</code></pre></div>"
      );
      return "\n" + NUL + "F" + idx + NUL + "\n";
    });

    var lines = text.split("\n");
    var out = [];
    var i = 0;
    var reFence = new RegExp("^" + NUL + "F\\d+" + NUL + "$");
    function isSpecial(l){
      return reFence.test(l.trim()) || /^(#{1,3})\s+/.test(l) || /^\s*>\s?/.test(l) ||
        /^\s*[-*]\s+/.test(l) || /^\s*\d+\.\s+/.test(l) ||
        /^\s*(---+|\*\*\*+|___+)\s*$/.test(l) || /^\s*$/.test(l);
    }
    while(i < lines.length){
      var line = lines[i];
      if(reFence.test(line.trim())){ out.push(line.trim()); i++; continue; }
      if(/^\s*$/.test(line)){ i++; continue; }
      if(/^\s*(---+|\*\*\*+|___+)\s*$/.test(line)){ out.push("<hr>"); i++; continue; }
      var h = /^(#{1,3})\s+(.*)$/.exec(line);
      if(h){
        var lvl = h[1].length;
        out.push('<h' + lvl + ' class="md-h md-h' + lvl + '">' + mdInline(h[2].trim()) + "</h" + lvl + ">");
        i++; continue;
      }
      if(/^\s*>\s?/.test(line)){
        var quote = [];
        while(i < lines.length && /^\s*>\s?/.test(lines[i])){
          quote.push(mdInline(lines[i].replace(/^\s*>\s?/, ""))); i++;
        }
        out.push('<blockquote class="md-quote">' + quote.join("<br>") + "</blockquote>");
        continue;
      }
      if(/^\s*[-*]\s+/.test(line)){
        var items = [];
        while(i < lines.length && /^\s*[-*]\s+/.test(lines[i])){
          items.push("<li>" + mdInline(lines[i].replace(/^\s*[-*]\s+/, "")) + "</li>"); i++;
        }
        out.push('<ul class="md-list">' + items.join("") + "</ul>");
        continue;
      }
      if(/^\s*\d+\.\s+/.test(line)){
        var oitems = [];
        while(i < lines.length && /^\s*\d+\.\s+/.test(lines[i])){
          oitems.push("<li>" + mdInline(lines[i].replace(/^\s*\d+\.\s+/, "")) + "</li>"); i++;
        }
        out.push('<ol class="md-list">' + oitems.join("") + "</ol>");
        continue;
      }
      var para = [];
      while(i < lines.length && !isSpecial(lines[i])){ para.push(mdInline(lines[i])); i++; }
      out.push('<p class="md-p">' + para.join("<br>") + "</p>");
    }

    var html = out.join("");
    html = html.replace(new RegExp(NUL + "F(\\d+)" + NUL, "g"), function(_, n){
      return fences[parseInt(n, 10)];
    });
    return html;
  }

  // ---------- v2 API helpers ----------
  function apiGet(url){
    return fetch(url, {cache:"no-store"}).then(function(res){
      return res.json().catch(function(){ return {}; }).then(function(j){
        if(!res.ok) throw new Error((j && j.error) || ("HTTP " + res.status));
        return j;
      });
    });
  }

  function fetchText(url){
    return fetch(url, {cache:"no-store"}).then(function(res){
      return res.text().then(function(t){
        if(!res.ok){
          var msg = t;
          try{ var j = JSON.parse(t); msg = j.error || t; }catch(e){}
          throw new Error(msg || ("HTTP " + res.status));
        }
        return t;
      });
    });
  }

  function sessionMatches(s, q){
    if(!q) return true;
    if(s.title && s.title.toLowerCase().indexOf(q) !== -1) return true;
    var terms = s.terms || [];
    for(var i=0;i<terms.length;i++){
      if(String(terms[i]).toLowerCase().indexOf(q) !== -1) return true;
    }
    return false;
  }

  // ---------- Graph module (force-directed canvas) ----------
  var Graph = (function(){
    var canvas, ctx, dpr = 1;
    var nodes = [];
    var nodeByIndex = new Map();
    var edgesAll = [];
    var springs = [];
    var springPairs = new Set();
    var zoom = 1, offX = 0, offY = 0;
    var hovered = null, dragging = null, panning = false, dragMoved = false;
    var dragStart = {x:0,y:0}, panStart = {x:0,y:0}, offStart = {x:0,y:0};
    var warmupTicks = 0;
    var rafId = null;
    var active = false;
    var selectedNode = null;
    var FRICTION = 0.85;
    var adjacency = new Map();     // i -> Set(neighbor i) over visible springs
    var focusSet = null;           // Set of focused node indices, or null
    var isolatedCluster = null;    // cluster id isolated via legend, or null

    function init(){
      canvas = $("graphCanvas");
      ctx = canvas.getContext("2d");
      canvas.addEventListener("wheel", onWheel, {passive:false});
      canvas.addEventListener("mousedown", onMouseDown);
      canvas.addEventListener("dblclick", onDblClick);
      window.addEventListener("mousemove", onMouseMove);
      window.addEventListener("mouseup", onMouseUp);
      window.addEventListener("resize", resize);
      resize();
    }

    function resize(){
      var view = $("viewGraph");
      var w = view.clientWidth || 800, h = view.clientHeight || 600;
      dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.round(w * dpr));
      canvas.height = Math.max(1, Math.round(h * dpr));
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      if(active) draw();
    }

    function setData(data){
      var oldPos = new Map();
      for(var k=0;k<nodes.length;k++){ oldPos.set(nodes[k].i, nodes[k]); }
      edgesAll = data.edges || [];
      var view = $("viewGraph");
      var w = view.clientWidth || 800, h = view.clientHeight || 600;
      nodes = (data.sessions || []).map(function(s){
        var prev = oldPos.get(s.i);
        var color = state.clusterColor.get(s.cluster) || PALETTE[Math.abs(s.cluster) % PALETTE.length];
        var r = 2 + 2 * Math.log(1 + (s.msgs || 0));
        return {
          i: s.i, id: s.id, title: s.title, cluster: s.cluster, terms: s.terms || [],
          tw: Array.isArray(s.tw) ? s.tw : [],
          r: r, color: color,
          x: prev ? prev.x : (w/2 + (Math.random()-0.5) * w * 0.7),
          y: prev ? prev.y : (h/2 + (Math.random()-0.5) * h * 0.7),
          vx: prev ? prev.vx : 0, vy: prev ? prev.vy : 0,
          ax: prev ? prev.ax : 0, ay: prev ? prev.ay : 0,
          tax: 0, tay: 0
        };
      });
      nodeByIndex = new Map();
      nodes.forEach(function(n){ nodeByIndex.set(n.i, n); });
      focusSet = null; isolatedCluster = null;
      rebuildSprings();
      warmupTicks = 300;
    }

    function rebuildSprings(){
      springs = edgesAll.filter(function(e){ return e[2] >= state.edgeThreshold; });
      springPairs = new Set(springs.map(function(e){ return e[0] + "_" + e[1]; }));
      buildAdjacency();
      warmupTicks = Math.max(warmupTicks, 150);
    }

    function buildAdjacency(){
      adjacency = new Map();
      nodes.forEach(function(n){ adjacency.set(n.i, new Set()); });
      springs.forEach(function(e){
        if(adjacency.has(e[0])) adjacency.get(e[0]).add(e[1]);
        if(adjacency.has(e[1])) adjacency.get(e[1]).add(e[0]);
      });
    }

    function neighborsOf(i){
      var s = adjacency.get(i);
      return s ? Array.from(s) : [];
    }

    // ---- focus mode ----
    function focusNode(i){
      isolatedCluster = null;
      var set = new Set();
      set.add(i);
      neighborsOf(i).forEach(function(nb){ set.add(nb); });
      focusSet = set;
      selectedNode = nodeByIndex.get(i) || null;
      if(active) draw();
    }
    function expandFocus(){
      if(!focusSet){ return; }
      var add = [];
      focusSet.forEach(function(i){ neighborsOf(i).forEach(function(nb){ add.push(nb); }); });
      add.forEach(function(nb){ focusSet.add(nb); });
      if(active) draw();
    }
    function clearFocus(){
      focusSet = null;
      if(active) draw();
    }
    function focusActive(){ return !!focusSet; }

    // ---- cluster isolate (legend) ----
    function isolateCluster(cid){
      focusSet = null;
      isolatedCluster = (isolatedCluster === cid) ? null : cid;
      if(active) draw();
      return isolatedCluster;
    }
    function clearIsolate(){
      isolatedCluster = null;
      if(active) draw();
    }
    function isolatedActive(){ return isolatedCluster != null ? isolatedCluster : null; }
    function anyGraphSelection(){ return !!focusSet || isolatedCluster != null; }
    function clearGraphSelection(){
      var changed = !!focusSet || isolatedCluster != null;
      focusSet = null; isolatedCluster = null;
      if(active) draw();
      return changed;
    }

    function activate(){
      active = true;
      resize();
      if(!rafId) loop();
    }
    function deactivate(){
      active = false;
      if(rafId){ cancelAnimationFrame(rafId); rafId = null; }
    }

    function setSelected(i){
      selectedNode = (i == null) ? null : (nodeByIndex.get(i) || null);
      if(active) draw();
    }

    function loop(){
      if(warmupTicks > 0 || dragging){
        tick();
        if(warmupTicks > 0) warmupTicks--;
      }
      draw();
      if(active){ rafId = requestAnimationFrame(loop); } else { rafId = null; }
    }

    function tick(){
      var n = nodes.length, i, node;
      for(i=0;i<n;i++){ node = nodes[i]; node.tax = 0; node.tay = 0; }
      for(i=0;i<n;i++){
        node = nodes[i];
        if(node === dragging) continue;
        node.x += node.vx + 0.5 * node.ax;
        node.y += node.vy + 0.5 * node.ay;
      }
      var REP = 3200;
      for(var a=0;a<n;a++){
        var A = nodes[a];
        for(var b=a+1;b<n;b++){
          var B = nodes[b];
          var dx = A.x - B.x, dy = A.y - B.y;
          var d2 = dx*dx + dy*dy;
          if(d2 < 4) d2 = 4;
          var dist = Math.sqrt(d2);
          var f = REP / d2;
          var fx = (dx/dist) * f, fy = (dy/dist) * f;
          A.tax += fx; A.tay += fy;
          B.tax -= fx; B.tay -= fy;
        }
      }
      var SPRING_K = 0.02, REST = 70;
      for(var s=0;s<springs.length;s++){
        var e = springs[s];
        var A2 = nodeByIndex.get(e[0]), B2 = nodeByIndex.get(e[1]);
        if(!A2 || !B2) continue;
        var w = e[2];
        var dx2 = B2.x - A2.x, dy2 = B2.y - A2.y;
        var dist2 = Math.sqrt(dx2*dx2 + dy2*dy2);
        if(dist2 < 0.01) dist2 = 0.01;
        var rest = REST * (1 - Math.min(w, 0.9) * 0.5);
        var f2 = SPRING_K * (dist2 - rest) * (0.4 + w);
        var fx2 = (dx2/dist2) * f2, fy2 = (dy2/dist2) * f2;
        A2.tax += fx2; A2.tay += fy2;
        B2.tax -= fx2; B2.tay -= fy2;
      }
      var view = $("viewGraph");
      var cx = (view.clientWidth || 800) / 2, cy = (view.clientHeight || 600) / 2;
      var GRAV = 0.0006;
      for(i=0;i<n;i++){
        node = nodes[i];
        node.tax += (cx - node.x) * GRAV;
        node.tay += (cy - node.y) * GRAV;
      }
      for(i=0;i<n;i++){
        node = nodes[i];
        if(node === dragging){ node.vx=0; node.vy=0; node.ax=0; node.ay=0; continue; }
        node.vx = (node.vx + 0.5 * (node.ax + node.tax)) * FRICTION;
        node.vy = (node.vy + 0.5 * (node.ay + node.tay)) * FRICTION;
        node.ax = node.tax; node.ay = node.tay;
      }
    }

    function screenToWorld(x, y){ return [ (x - offX) / zoom, (y - offY) / zoom ]; }

    // Substring matcher (fallback when tw absent, and for other views' parity).
    function nodeMatchesSearch(node, q){
      if(!q) return true;
      if(node.title && node.title.toLowerCase().indexOf(q) !== -1) return true;
      for(var i=0;i<node.terms.length;i++){
        if(String(node.terms[i]).toLowerCase().indexOf(q) !== -1) return true;
      }
      return false;
    }

    // Weighted score: query tokens prefix-match tw terms (summed weight) plus a
    // title-substring bonus. Degrades to substring when tw is absent/empty.
    function nodeSearchScore(node, q, tokens){
      var score = 0;
      var tw = node.tw || [];
      if(tw.length && tokens.length){
        for(var t=0;t<tokens.length;t++){
          var tok = tokens[t];
          if(!tok) continue;
          for(var k=0;k<tw.length;k++){
            var term = String(tw[k][0]).toLowerCase();
            if(term.indexOf(tok) === 0) score += (tw[k][1] || 0);
          }
        }
      }
      if(node.title && node.title.toLowerCase().indexOf(q) !== -1) score += 0.5;
      if(score === 0 && (!tw.length) && nodeMatchesSearch(node, q)) score = 0.5; // pure substring fallback
      return score;
    }

    function drawBackdrop(w, h){
      // Faint star-chart backdrop: dotted grid + a couple of meridian rings.
      // Screen-space, opacity <= 0.05, cheap.
      ctx.save();
      var gc = THEME.gridRgb;
      ctx.fillStyle = "rgba(" + gc + ",0.05)";
      var step = 42;
      for(var gx = (offX % step + step) % step; gx < w; gx += step){
        for(var gy = (offY % step + step) % step; gy < h; gy += step){
          ctx.fillRect(gx, gy, 1, 1);
        }
      }
      ctx.strokeStyle = "rgba(" + gc + ",0.045)";
      ctx.lineWidth = 1;
      var cx = w / 2, cy = h / 2;
      var base = Math.min(w, h);
      [0.28, 0.46, 0.66].forEach(function(f){
        ctx.beginPath();
        ctx.arc(cx, cy, base * f, 0, Math.PI * 2);
        ctx.stroke();
      });
      ctx.restore();
    }

    function draw(){
      if(!ctx) return;
      var w = canvas.width / dpr, h = canvas.height / dpr;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = THEME.bg;
      ctx.fillRect(0, 0, w, h);
      drawBackdrop(w, h);

      var q = (state.search || "").trim().toLowerCase();
      var searchActive = q.length > 0;
      var tokens = searchActive ? q.split(/\s+/).filter(Boolean) : [];

      // Weighted search scores (only when searching and no focus/isolate override).
      var scoreMax = 0, scoreOf = null;
      if(searchActive && !focusSet && isolatedCluster == null){
        scoreOf = new Map();
        for(var s0=0;s0<nodes.length;s0++){
          var sc = nodeSearchScore(nodes[s0], q, tokens);
          scoreOf.set(nodes[s0].i, sc);
          if(sc > scoreMax) scoreMax = sc;
        }
      }

      // Hover highlight only when no held focus/isolate.
      var highlightSet = null;
      if(hovered && !focusSet && isolatedCluster == null && !searchActive){
        highlightSet = new Set();
        highlightSet.add(hovered.i);
        for(var si=0; si<springs.length; si++){
          var e = springs[si];
          if(e[0] === hovered.i) highlightSet.add(e[1]);
          else if(e[1] === hovered.i) highlightSet.add(e[0]);
        }
      }

      // Per-node alpha + label decision.
      function nodeAlpha(node){
        if(focusSet) return focusSet.has(node.i) ? 1 : 0.12;
        if(isolatedCluster != null) return node.cluster === isolatedCluster ? 1 : 0.10;
        if(scoreOf){
          var sc = scoreOf.get(node.i) || 0;
          if(sc <= 0) return 0.12;
          return scoreMax > 0 ? (0.5 + 0.5 * (sc / scoreMax)) : 1;
        }
        if(highlightSet) return highlightSet.has(node.i) ? 1 : 0.15;
        return 1;
      }
      function nodeLit(node){
        if(focusSet) return focusSet.has(node.i);
        if(isolatedCluster != null) return node.cluster === isolatedCluster;
        if(scoreOf) return (scoreOf.get(node.i) || 0) > 0;
        if(highlightSet) return highlightSet.has(node.i);
        return false;
      }

      ctx.save();
      ctx.translate(offX, offY);
      ctx.scale(zoom, zoom);

      // edges
      for(var k=0;k<springs.length;k++){
        var edge = springs[k];
        var A = nodeByIndex.get(edge[0]), B = nodeByIndex.get(edge[1]);
        if(!A || !B) continue;
        var ew = edge[2];
        var alpha = 0.2 + ew * 0.5;
        var aLit = nodeLit(A), bLit = nodeLit(B);
        if(focusSet){
          alpha = (aLit && bLit) ? Math.min(1, alpha + 0.35) : alpha * 0.10;
        } else if(isolatedCluster != null){
          alpha = (aLit && bLit) ? alpha : alpha * 0.08;
        } else if(scoreOf){
          alpha = (aLit && bLit) ? alpha : alpha * 0.12;
        } else if(highlightSet){
          var isHL = highlightSet.has(edge[0]) && highlightSet.has(edge[1]) &&
                     (edge[0] === hovered.i || edge[1] === hovered.i);
          alpha = isHL ? Math.min(1, alpha + 0.35) : alpha * 0.15;
        }
        ctx.strokeStyle = "rgba(" + THEME.edgeRgb + "," + alpha.toFixed(3) + ")";
        ctx.lineWidth = 1 / zoom;
        ctx.beginPath();
        ctx.moveTo(A.x, A.y);
        ctx.lineTo(B.x, B.y);
        ctx.stroke();
      }

      // nodes (soft glow in cluster color for lit nodes → constellation feel)
      for(var ni=0; ni<nodes.length; ni++){
        var node = nodes[ni];
        var a2 = nodeAlpha(node);
        var lit = nodeLit(node) || (!focusSet && isolatedCluster == null && !scoreOf && !highlightSet);

        ctx.globalAlpha = a2;
        ctx.beginPath();
        ctx.arc(node.x, node.y, node.r, 0, Math.PI * 2);
        ctx.fillStyle = node.color;
        if(lit && a2 > 0.5){ ctx.shadowBlur = 10; ctx.shadowColor = node.color; }
        else { ctx.shadowBlur = 0; }
        ctx.fill();
        ctx.shadowBlur = 0;
        if(selectedNode && node.i === selectedNode.i){
          ctx.lineWidth = 2 / zoom;
          ctx.strokeStyle = THEME.text;
          ctx.stroke();
        }
        ctx.globalAlpha = 1;

        var forceLabel = (a2 >= 0.99 && (focusSet || isolatedCluster != null)) ||
                         (scoreOf && (scoreOf.get(node.i) || 0) > 0 && zoom > 0.55) ||
                         (highlightSet && highlightSet.has(node.i));
        var showLabel = zoom > 1.6 || forceLabel;
        if(showLabel){
          ctx.globalAlpha = a2;
          ctx.fillStyle = THEME.text;
          ctx.font = (12 / zoom) + "px sans-serif";
          ctx.fillText(truncate(node.title, 30), node.x + node.r + 4, node.y + 4);
          ctx.globalAlpha = 1;
        }
      }

      ctx.restore();
      updateHud();
    }

    function updateHud(){
      var el = $("graphHud");
      if(!el) return;
      var extra = "";
      if(focusSet) extra = " · focus " + focusSet.size;
      else if(isolatedCluster != null) extra = " · region isolated";
      el.textContent = nodes.length + " nodes · " + springs.length + " links ≥ " +
        state.edgeThreshold.toFixed(2) + " · zoom " + zoom.toFixed(2) + "× · chart" + extra;
    }

    function hitTest(mx, my){
      var wp = screenToWorld(mx, my);
      var wx = wp[0], wy = wp[1];
      var best = null, bestD = Infinity;
      var pad = Math.max(3, 4 / zoom);
      for(var i=0;i<nodes.length;i++){
        var node = nodes[i];
        var dx = node.x - wx, dy = node.y - wy;
        var d = Math.sqrt(dx*dx + dy*dy);
        if(d <= node.r + pad && d < bestD){ best = node; bestD = d; }
      }
      return best;
    }

    function onWheel(ev){
      ev.preventDefault();
      var rect = canvas.getBoundingClientRect();
      var mx = ev.clientX - rect.left, my = ev.clientY - rect.top;
      var wp = screenToWorld(mx, my);
      var factor = ev.deltaY < 0 ? 1.12 : 1/1.12;
      var newZoom = clamp(zoom * factor, 0.15, 6);
      offX = mx - wp[0] * newZoom;
      offY = my - wp[1] * newZoom;
      zoom = newZoom;
      draw();
    }

    function onMouseDown(ev){
      if(!active) return;
      if(ev.button !== 0) return;
      var rect = canvas.getBoundingClientRect();
      var mx = ev.clientX - rect.left, my = ev.clientY - rect.top;
      var hit = hitTest(mx, my);
      dragStart = {x:mx, y:my};
      dragMoved = false;
      if(hit){
        dragging = hit;
        canvas.classList.add("dragging");
      } else {
        panning = true;
        panStart = {x:mx, y:my};
        offStart = {x:offX, y:offY};
        canvas.classList.add("dragging");
      }
    }

    function onMouseMove(ev){
      if(!active && !dragging && !panning) return;
      var rect = canvas.getBoundingClientRect();
      var mx = ev.clientX - rect.left, my = ev.clientY - rect.top;

      if(dragging){
        var wp = screenToWorld(mx, my);
        dragging.x = wp[0]; dragging.y = wp[1];
        if(Math.hypot(mx - dragStart.x, my - dragStart.y) > 4) dragMoved = true;
        warmupTicks = Math.max(warmupTicks, 2);
        draw();
        return;
      }
      if(panning){
        offX = offStart.x + (mx - panStart.x);
        offY = offStart.y + (my - panStart.y);
        if(Math.hypot(mx - dragStart.x, my - dragStart.y) > 4) dragMoved = true;
        draw();
        return;
      }
      if(!active) return;
      var inBounds = mx >= 0 && my >= 0 && mx <= rect.width && my <= rect.height;
      var hit = inBounds ? hitTest(mx, my) : null;
      if(hit !== hovered){ hovered = hit; draw(); }
    }

    function onMouseUp(){
      if(dragging){
        var node = dragging;
        var wasClick = !dragMoved;
        dragging = null;
        canvas.classList.remove("dragging");
        warmupTicks = Math.max(warmupTicks, 120);
        if(wasClick) onGraphNodeClick(node.i);   // focus + story panel
      } else if(panning){
        var wasBgClick = !dragMoved;
        panning = false;
        canvas.classList.remove("dragging");
        if(wasBgClick) onGraphBackground();       // clear focus / isolate
      }
    }

    function onDblClick(ev){
      if(!active) return;
      var rect = canvas.getBoundingClientRect();
      var mx = ev.clientX - rect.left, my = ev.clientY - rect.top;
      var hit = hitTest(mx, my);
      if(hit && !focusSet) focusNode(hit.i);       // first: establish focus
      expandFocus();                               // then expand one ring
    }

    return {
      init: init, setData: setData, activate: activate, deactivate: deactivate,
      rebuildSprings: rebuildSprings, setSelected: setSelected,
      redraw: function(){ if(active) draw(); },
      focusNode: focusNode, expandFocus: expandFocus, clearFocus: clearFocus,
      focusActive: focusActive, isolateCluster: isolateCluster, clearIsolate: clearIsolate,
      isolatedActive: isolatedActive, anyGraphSelection: anyGraphSelection,
      clearGraphSelection: clearGraphSelection,
      // test/debug helpers (only wired to window under ?__test=1)
      screenPosOf: function(i){ var n = nodeByIndex.get(i); return n ? [n.x * zoom + offX, n.y * zoom + offY] : null; },
      debugScores: function(q){
        q = (q || "").trim().toLowerCase();
        var toks = q.split(/\s+/).filter(Boolean);
        return nodes.map(function(n){ return [n.title, nodeSearchScore(n, q, toks)]; })
          .sort(function(a, b){ return b[1] - a[1]; });
      },
      focusSize: function(){ return focusSet ? focusSet.size : 0; }
    };
  })();

  // ---------- data loading ----------
  function buildIndices(){
    var d = state.data;
    state.clusterColor = new Map();
    (d.clusters || []).forEach(function(c, idx){
      state.clusterColor.set(c.id, PALETTE[idx % PALETTE.length]);
    });
    state.neighbors = new Map();
    state.sessionByIndex = new Map();
    state.twByIndex = new Map();        // i -> Map(term -> weight), from `tw` (may be empty)
    (d.sessions || []).forEach(function(s){
      state.neighbors.set(s.i, []);
      state.sessionByIndex.set(s.i, s);
      var m = new Map();
      if(Array.isArray(s.tw)){
        s.tw.forEach(function(pair){
          if(Array.isArray(pair) && pair.length >= 2) m.set(String(pair[0]), pair[1]);
        });
      }
      state.twByIndex.set(s.i, m);
    });
    (d.edges || []).forEach(function(e){
      var a = e[0], b = e[1], w = e[2];
      if(state.neighbors.has(a)) state.neighbors.get(a).push({i:b, w:w});
      if(state.neighbors.has(b)) state.neighbors.get(b).push({i:a, w:w});
    });
    state.neighbors.forEach(function(arr){ arr.sort(function(x,y){ return y.w - x.w; }); });
  }

  // Shared-term explanation for an edge (i, j): intersection of the two sessions'
  // tw term sets, ranked by min(w_i, w_j), top `k`. Empty when tw is absent.
  function sharedTermsBetween(i, j, k){
    k = k || 3;
    var mi = state.twByIndex && state.twByIndex.get(i);
    var mj = state.twByIndex && state.twByIndex.get(j);
    if(!mi || !mj || mi.size === 0 || mj.size === 0) return [];
    var out = [];
    mi.forEach(function(wi, term){
      if(mj.has(term)) out.push([term, Math.min(wi, mj.get(term))]);
    });
    out.sort(function(a, b){ return b[1] - a[1]; });
    return out.slice(0, k).map(function(p){ return p[0]; });
  }

  function loadData(){
    return fetch("/data.json", {cache:"no-store"}).then(function(res){
      if(!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    }).then(function(json){
      if(!json || !Array.isArray(json.sessions)) throw new Error("malformed data.json");
      if(json.sessions.length === 0){
        state.data = json;
        buildIndices();
        showError("No sessions charted yet — run the indexer, then retry.");
        renderStats();
        return;
      }
      state.data = json;
      buildIndices();
      hideError();
      renderAll();
    }).catch(function(err){
      showError("Failed to load data.json — " + err.message);
    });
  }

  // ---------- Graph cluster legend (map legend) ----------
  function renderGraphLegend(){
    var body = $("legendBody");
    if(!body || !state.data) return;
    var clusters = (state.data.clusters || []).slice().sort(function(a, b){
      return (b.size || 0) - (a.size || 0);
    });
    var LIMIT = 12;
    var shown = state.graph.legendExpanded ? clusters : clusters.slice(0, LIMIT);
    var hiddenCount = clusters.length - shown.length;
    var html = shown.map(function(c){
      var color = state.clusterColor.get(c.id) || "#888";
      var active = (state.graph.isolatedCluster === c.id) ? " active" : "";
      return '<div class="legend-row' + active + '" data-cid="' + escapeHtml(String(c.id)) + '">' +
        '<span class="cluster-dot" style="background:' + color + ';color:' + color + '"></span>' +
        '<span class="legend-label" title="' + escapeHtml(c.label) + '">' + escapeHtml(c.label) + "</span>" +
        '<span class="legend-size">' + (c.size || 0) + "</span></div>";
    }).join("");
    if(!state.graph.legendExpanded && hiddenCount > 0){
      html += '<div class="legend-more" id="legendMore">+' + hiddenCount + " more regions</div>";
    } else if(state.graph.legendExpanded && clusters.length > LIMIT){
      html += '<div class="legend-more" id="legendMore">show fewer</div>';
    }
    body.innerHTML = html || '<div class="legend-more">No regions charted.</div>';

    body.querySelectorAll(".legend-row").forEach(function(row){
      row.addEventListener("click", function(){
        var cid = parseInt(row.dataset.cid, 10);
        var nowIso = Graph.isolateCluster(cid);
        state.graph.isolatedCluster = nowIso;
        renderGraphLegend();
      });
    });
    var moreBtn = $("legendMore");
    if(moreBtn){
      moreBtn.addEventListener("click", function(){
        state.graph.legendExpanded = !state.graph.legendExpanded;
        renderGraphLegend();
      });
    }
  }

  // ---------- Tiles ----------
  function renderTiles(){
    var grid = $("clusterGrid");
    if(!state.data){ grid.innerHTML = ""; return; }
    var q = state.search.trim().toLowerCase();
    var html = "";
    var sessions = state.data.sessions;
    state.data.clusters.forEach(function(c){
      var members = sessions.filter(function(s){ return s.cluster === c.id; });
      var visible = q ? members.filter(function(s){ return sessionMatches(s, q); }) : members;
      if(q && visible.length === 0) return;
      var color = state.clusterColor.get(c.id) || "#888";
      var chips = visible.map(function(s){
        return '<div class="chip" data-i="' + s.i + '" title="' + escapeHtml(s.title) + '">' +
          escapeHtml(truncate(s.title, 42)) +
          '<span class="chip-time">' + fmtRelative(s.mtime) + "</span></div>";
      }).join("");
      html += '<div class="cluster-card">' +
        '<div class="cluster-card-header"><span class="cluster-dot" style="background:' + color + '"></span>' +
        "<span>" + escapeHtml(c.label) + "</span>" +
        '<span class="badge">' + c.size + "</span></div>" +
        '<div class="chip-list">' + chips + "</div></div>";
    });
    grid.innerHTML = html || '<div class="stats" style="padding:10px;">No matches.</div>';
    grid.querySelectorAll(".chip").forEach(function(el){
      el.addEventListener("click", function(){ openDetail(parseInt(el.dataset.i, 10)); });
    });
  }

  // ---------- Tree ----------
  function renderTree(){
    var container = $("treeContainer");
    if(!state.data){ container.innerHTML = ""; return; }
    var q = state.search.trim().toLowerCase();
    var clusterLabel = new Map();
    state.data.clusters.forEach(function(c){ clusterLabel.set(c.id, c.label); });

    var byProject = new Map();
    state.data.sessions.forEach(function(s){
      if(q && !sessionMatches(s, q)) return;
      if(!byProject.has(s.project)){
        byProject.set(s.project, {label: s.projectLabel || s.project, clusters: new Map()});
      }
      var proj = byProject.get(s.project);
      if(!proj.clusters.has(s.cluster)) proj.clusters.set(s.cluster, []);
      proj.clusters.get(s.cluster).push(s);
    });

    var html = "";
    byProject.forEach(function(proj, projKey){
      var total = 0;
      proj.clusters.forEach(function(arr){ total += arr.length; });
      html += "<details open><summary>" + escapeHtml(proj.label) +
        ' <span class="badge">' + total + "</span></summary>";
      proj.clusters.forEach(function(sessArr, cid){
        var color = state.clusterColor.get(cid) || "#888";
        html += '<details open style="margin-left:18px;"><summary>' +
          '<span class="cluster-dot" style="background:' + color + ';display:inline-block;margin-right:6px;vertical-align:middle;"></span>' +
          escapeHtml(clusterLabel.get(cid) || ("cluster " + cid)) +
          ' <span class="badge">' + sessArr.length + "</span></summary>";
        sessArr.forEach(function(s){
          html += '<div class="tree-session" data-i="' + s.i + '"><span>' +
            escapeHtml(truncate(s.title, 64)) + '</span><span class="chip-time">' +
            fmtRelative(s.mtime) + "</span></div>";
        });
        html += "</details>";
      });
      html += "</details>";
    });

    container.innerHTML = html || '<div class="stats" style="padding:10px;">No matches.</div>';
    container.querySelectorAll(".tree-session").forEach(function(el){
      el.addEventListener("click", function(){ openDetail(parseInt(el.dataset.i, 10)); });
    });
  }

  // ---------- Chat ----------
  var composerEl = null; // set during wiring

  function renderChatSidebar(){
    var el = $("chatSessionList");
    if(!el) return;
    if(!state.data){ el.innerHTML = ""; return; }
    var q = (state.chat.sidebarFilter || "").trim().toLowerCase();
    var projectFilter = state.chat.projectFilter;

    var clusterSize = new Map();
    state.data.clusters.forEach(function(c){ clusterLabel.set(c.id, c.label); clusterSize.set(c.id, c.size); });

    var byCluster = new Map();
    state.data.sessions.forEach(function(s){
      if(projectFilter && s.project !== projectFilter) return;
      if(q && !sessionMatches(s, q)) return;
      if(!byCluster.has(s.cluster)) byCluster.set(s.cluster, []);
      byCluster.get(s.cluster).push(s);
    });

    var clusterIds = Array.from(byCluster.keys()).sort(function(a, b){
      return (clusterSize.get(b) || 0) - (clusterSize.get(a) || 0);
    });

    var html = "";
    if(projectFilter){
      html += '<div class="chat-filter-banner"><span>project: ' + escapeHtml(projectFilter) +
        '</span><button id="clearProjectFilter" class="copy-btn">clear</button></div>';

    clusterIds.forEach(function(cid){

      html += '<div class="chat-cluster-group">' +
        '<div class="chat-cluster-header"><span class="cluster-dot" style="background:' + color + '"></span>' +
        escapeHtml(clusterLabel.get(cid) || ("cluster " + cid)) +
        ' <span class="badge">' + members.length + "</span></div>";

        var active = (state.chat.mode === "existing" && state.chat.selectedSessionId === s.id) ? " active" : "";
        html += '<div class="chat-session-item' + active + '" data-id="' + escapeHtml(s.id) +
          '" data-project="' + escapeHtml(s.project) + '" title="' + escapeHtml(s.title) + '"><span>' +
          escapeHtml(truncate(s.title, 38)) + '</span><span class="chip-time">' +
          fmtRelative(s.mtime) + "</span></div>";
      });

  function loadTranscript(project, id){

  // ---------- Shared chat rendering component (historic + live) ----------
  // buildGroupShell/buildAvatar/buildTextBubble/buildToolChip/buildThinkingRow
  // are used both by renderTranscript (historic) and by the live SSE handler,
  // so a tool chip or thinking row looks identical whichever path produced it.

  function buildAvatar(role){
    var a = document.createElement("div");
    a.className = "msg-avatar " + role;
    a.textContent = role === "user" ? "You" : "C";
    return a;
  }

  function buildGroupShell(role, live){
    var row = document.createElement("div");
    row.className = "msg-row " + role + (live ? " live" : "");
    var col = document.createElement("div");
    col.className = "msg-col";
    row.appendChild(buildAvatar(role));
    row.appendChild(col);
    return {row: row, col: col};
  }

  function buildTextBubble(rawText, ts, role){
    var bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    var md = document.createElement("div");
    md.className = "md-rendered";
    md.innerHTML = renderMarkdown(rawText || "");
    bubble.appendChild(md);
    if(ts){
      var meta = document.createElement("div");
      meta.className = "msg-meta";
      meta.textContent = fmtRelative(ts);
      bubble.appendChild(meta);
    }
    return {bubble: bubble, md: md};
  }

  function buildToolChip(tool){
    // tool: {name, input, result, isError, pending}
    var chip = document.createElement("div");
    chip.className = "tool-chip" + (tool.pending ? "" : (tool.isError ? " error" : " done"));
    var status = tool.pending
      ? '<span class="tool-spinner"></span>'
      : (tool.isError ? "✕" : "✓");
    var head = document.createElement("div");
    head.className = "tool-chip-head";
    head.innerHTML =
      '<span class="tool-chip-ic">⚙</span>' +
      '<span class="tool-chip-name">' + escapeHtml(tool.name || "tool") + "</span>" +
      '<span class="tool-chip-in">' + escapeHtml(tool.input || "") + "</span>" +
      '<span class="tool-chip-st">' + status + "</span>" +
      '<span class="tool-chip-caret">▶</span>';
    var body = document.createElement("div");
    body.className = "tool-chip-body";
    setChipBody(body, tool);
    chip.appendChild(head);
    chip.appendChild(body);
    return chip;
  }

  function setChipBody(body, tool){
    if(tool.pending){ body.textContent = "running…"; return; }
    if(tool.result == null || tool.result === ""){ body.textContent = "no result"; return; }
    body.textContent = tool.result;
  }

  // Flip a live chip from pending to a finished (done/error) state + fill snippet.
  function finishToolChip(chip, result, isError){
    chip.classList.remove("error", "done");
    chip.classList.add(isError ? "error" : "done");
    var st = chip.querySelector(".tool-chip-st");
    if(st) st.innerHTML = isError ? "✕" : "✓";
    var body = chip.querySelector(".tool-chip-body");
    if(body) setChipBody(body, {pending: false, result: result, isError: isError});
  }

  function buildThinkingRow(thinkingText){
    var wrap = document.createElement("div");
    wrap.className = "md-thinking";
    var head = document.createElement("div");
    head.className = "md-thinking-head";
    head.innerHTML = '<span>✳ thinking</span><span class="tool-chip-caret">▶</span>';
    var body = document.createElement("div");
    body.className = "md-thinking-body";
    body.textContent = thinkingText || "";
    wrap.appendChild(head);
    wrap.appendChild(body);
    return wrap;
  }

  function buildTurnStats(obj){
    var el = document.createElement("div");
    el.className = "turn-stats";
    var rest = [];
    var isErr = obj && (obj.is_error || (obj.subtype && obj.subtype !== "success"));
    var marker;
    if(isErr){
      el.className += " error";
      marker = "✕ " + (obj.subtype || "error");
    } else {
      marker = "✓";
    }
    if(obj && typeof obj.duration_ms === "number") rest.push((obj.duration_ms / 1000).toFixed(1) + "s");
    if(obj && typeof obj.total_cost_usd === "number") rest.push("$" + obj.total_cost_usd.toFixed(4));
    var usage = obj && obj.usage;
    if(usage && (typeof usage.input_tokens === "number" || typeof usage.output_tokens === "number")){
      var ins = typeof usage.input_tokens === "number" ? fmtTokens(usage.input_tokens) : "?";
      var outs = typeof usage.output_tokens === "number" ? fmtTokens(usage.output_tokens) : "?";
      rest.push(ins + " in / " + outs + " out");
    }
    if(obj && typeof obj.num_turns === "number") rest.push(obj.num_turns + " turn" + (obj.num_turns === 1 ? "" : "s"));
    el.textContent = marker + (rest.length ? " " + rest.join(" · ") : "");
    return el;
  }

  function fmtTokens(n){
    if(n < 1000) return String(n);
    return (n / 1000).toFixed(1) + "k";
  }

  // Append one historic/assistant message's content into a group column,
  // in order: thinking row, text bubble, then tool chips.
  function appendMessageContent(col, role, m){
    if(role === "assistant" && m.thinking){
      col.appendChild(buildThinkingRow(m.thinking));
    }
    var hasText = (m.text != null && String(m.text).length > 0);
    if(hasText || role === "user"){
      col.appendChild(buildTextBubble(m.text || "", m.ts, role).bubble);
    }
    if(role === "assistant" && Array.isArray(m.tools)){
      m.tools.forEach(function(t){
        col.appendChild(buildToolChip({
          name: t.name, input: t.input, result: t.result,
          isError: !!t.isError, pending: false
        }));
      });
    }
  }

  function renderTranscript(t){
    var container = $("chatTranscript");
    container.innerHTML = "";
    var messages = (t && Array.isArray(t.messages)) ? t.messages : [];
    if(!messages.length){
      container.innerHTML = '<div class="stats" style="padding:14px;">No messages yet.</div>';
      return;
    }
    // Group consecutive same-role messages into one visual turn group.
    var groups = [];
    messages.forEach(function(m){
      var role = (m.role === "user") ? "user" : "assistant";
      if(groups.length && groups[groups.length - 1].role === role){
        groups[groups.length - 1].messages.push(m);
      } else {
        groups.push({role: role, messages: [m]});
      }
    });
    groups.forEach(function(g){
      var shell = buildGroupShell(g.role, false);
      g.messages.forEach(function(m){ appendMessageContent(shell.col, g.role, m); });
      container.appendChild(shell.row);
    });
    if(t && t.truncated){
      var tr = document.createElement("div");
      tr.className = "chat-system-line";
      tr.textContent = "— transcript truncated —";
      container.appendChild(tr);
    }
    container.scrollTop = container.scrollHeight;
  }

  // ---------- Chat: skill autocomplete ----------
  function updateSkillPopup(){
    var val = composerEl.value;
    var m = /^\/([a-zA-Z0-9_-]*)$/.exec(val);
    if(!m){ closeSkillPopup(); return; }
    var q = m[1].toLowerCase();
    var matches = state.skills.filter(function(s){
      return s.name && s.name.toLowerCase().indexOf(q) === 0;
    }).slice(0, 8);
    if(!matches.length){ closeSkillPopup(); return; }
    state.chat.skillPopupOpen = true;
    state.chat.skillPopupIndex = 0;
    state.chat.skillPopupMatches = matches;
    renderSkillPopup();
  }

  function renderSkillPopup(){
    var el = $("skillAutocomplete");
    var matches = state.chat.skillPopupMatches || [];
    el.innerHTML = matches.map(function(s, idx){
      return '<div class="skill-ac-item' + (idx === state.chat.skillPopupIndex ? " active" : "") +
        '" data-idx="' + idx + '"><strong>/' + escapeHtml(s.name) + "</strong> <span>" +
        escapeHtml(truncate(s.description || "", 60)) + "</span></div>";
    }).join("");
    el.style.display = "block";
    el.querySelectorAll(".skill-ac-item").forEach(function(item){
      item.addEventListener("mousedown", function(ev){
        ev.preventDefault();
        state.chat.skillPopupIndex = parseInt(item.dataset.idx, 10);
        acceptSkillSuggestion();
      });
    });
  }

  function moveSkillPopupSelection(delta){
    var matches = state.chat.skillPopupMatches || [];
    if(!matches.length) return;
    state.chat.skillPopupIndex = (state.chat.skillPopupIndex + delta + matches.length) % matches.length;
    renderSkillPopup();
  }

  function acceptSkillSuggestion(){
    var matches = state.chat.skillPopupMatches || [];
    var s = matches[state.chat.skillPopupIndex];
    if(!s) return;
    composerEl.value = "/" + s.name + " ";
    closeSkillPopup();
    composerEl.focus();
  }

  function closeSkillPopup(){
    state.chat.skillPopupOpen = false;

  function appendSystemLine(text){
    clearTranscriptPlaceholder();
    var div = document.createElement("div");
    div.className = "chat-system-line";
    div.textContent = text;
    $("chatTranscript").appendChild(div);
    scrollTranscript();
  }

  // Typing indicator: 3 pulsing dots in an assistant bubble, from send until the
  // first assistant/tool/thinking event replaces it (via ensureLiveGroup).
  function showTyping(){
    removeTyping();
    clearTranscriptPlaceholder();
    var shell = buildGroupShell("assistant", true);
    var typing = document.createElement("div");
    typing.className = "typing";
    typing.innerHTML = "<span></span><span></span><span></span>";
    shell.col.appendChild(typing);
    $("chatTranscript").appendChild(shell.row);
    state.chat.typingEl = shell.row;
    scrollTranscript();
  }
  function removeTyping(){
    if(state.chat.typingEl && state.chat.typingEl.parentNode){
      state.chat.typingEl.parentNode.removeChild(state.chat.typingEl);
    }
    state.chat.typingEl = null;
  }

  // The current live assistant turn group (one avatar, many bubbles/chips).
  function ensureLiveGroup(){
    removeTyping();
    if(!state.chat.liveCol){
      clearTranscriptPlaceholder();
      var shell = buildGroupShell("assistant", true);
      $("chatTranscript").appendChild(shell.row);
      state.chat.liveRow = shell.row;
      state.chat.liveCol = shell.col;
      state.chat.liveTextEl = null;
      state.chat.liveTextRaw = "";
    }
    return state.chat.liveCol;
  }

  function liveAppendText(text){
    if(!text) return;
    var col = ensureLiveGroup();
    if(!state.chat.liveTextEl){
      var tb = buildTextBubble("", null, "assistant");
      col.appendChild(tb.bubble);
      state.chat.liveTextEl = tb.md;
      state.chat.liveTextRaw = "";
    }
    state.chat.liveTextRaw += text;
    state.chat.liveTextEl.innerHTML = renderMarkdown(state.chat.liveTextRaw);
    scrollTranscript();
  }

  function liveAppendThinking(text){
    var col = ensureLiveGroup();
    col.appendChild(buildThinkingRow(text));
    state.chat.liveTextEl = null; state.chat.liveTextRaw = "";
    scrollTranscript();
  }

  function liveAppendChip(block){
    var col = ensureLiveGroup();
    var chip = buildToolChip({
      name: block.name, input: summarizeToolInput(block.input),
      result: null, isError: false, pending: true
    });
    if(block.id){ chip.dataset.toolId = block.id; state.chat.toolChips[block.id] = chip; }
    col.appendChild(chip);
    state.chat.liveTextEl = null; state.chat.liveTextRaw = "";
    scrollTranscript();
  }

  function liveResolveToolResult(block){
    var id = block.tool_use_id;
    var chip = id ? state.chat.toolChips[id] : null;
    if(!chip) return;
    finishToolChip(chip, toolResultSnippet(block.content), !!block.is_error);
  }

  function finalizeTurn(obj){
    var col = state.chat.liveCol || ensureLiveGroup();
    col.appendChild(buildTurnStats(obj));
    scrollTranscript();
    state.chat.liveRow = null;
    state.chat.liveCol = null;
    state.chat.liveTextEl = null;
    state.chat.liveTextRaw = "";
    state.chat.toolChips = {};
  }

  // Client-side summary matching the backend's tool_use input rule (for live
  // tool_use blocks, whose raw input object we receive over the stream).
  function summarizeToolInput(input){
    var s = "";
    if(input && typeof input === "object" && !Array.isArray(input)){
      var keys = ["command", "file_path", "path", "pattern", "url", "prompt", "description", "query"];
      for(var k = 0; k < keys.length; k++){
        if(typeof input[keys[k]] === "string" && input[keys[k]]){ s = input[keys[k]]; break; }
      }
      if(!s){ try{ s = JSON.stringify(input); }catch(e){ s = String(input); } }
    } else if(input != null){ s = String(input); }
    s = s.replace(/\s+/g, " ").trim();
    return s.length > 200 ? s.slice(0, 199) + "…" : s;
  }

  function toolResultSnippet(content){
    var s = "";
    if(typeof content === "string"){ s = content; }
    else if(Array.isArray(content)){
      s = content.filter(function(b){ return b && b.type === "text" && typeof b.text === "string"; })
        .map(function(b){ return b.text; }).join("\n");
    } else if(content != null){ try{ s = JSON.stringify(content); }catch(e){ s = String(content); } }
    s = s.replace(/\s+/g, " ").trim();
    return s.length > 300 ? s.slice(0, 299) + "…" : s;
  }

  function setComposerBusy(busy){
    state.chat.streaming = busy;
    var btn = $("chatSendBtn");
    if(busy){
      btn.disabled = false;            // stays clickable so it can act as Stop
      btn.textContent = "Stop";
      btn.classList.add("stop");
    } else {
      btn.disabled = state.chat.runDisabled;
      btn.textContent = "Send";
      btn.classList.remove("stop");
    }
    composerEl.disabled = busy || state.chat.runDisabled;
  }

  function showRunDisabledBanner(msg){
    state.chat.runDisabled = true;
    var el = $("chatRunBanner");
    el.textContent = msg || "Run disabled — start server with --enable-run";
    el.style.display = "block";
    composerEl.disabled = true;
    var btn = $("chatSendBtn");
    btn.disabled = true;
    btn.textContent = "Send";
    btn.classList.remove("stop");
  }

  function refreshSidebarAfterChat(){
    loadData();
    loadProjects();
  }

  function resetLiveState(){
    state.chat.pid = null;
    state.chat.liveRow = null;
    state.chat.liveCol = null;
    state.chat.liveTextEl = null;
    state.chat.liveTextRaw = "";
    state.chat.toolChips = {};
    removeTyping();
  }

  function stopChat(){
    if(!state.chat.streaming) return;
    if(state.chat.pid == null){
      appendSystemLine("Cannot stop: no process id received from server yet.");
      return;
    }
    var pid = state.chat.pid;
    fetch("/api/chat/stop", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({pid: pid})
    }).then(function(res){
      if(!res.ok){
        return res.json().catch(function(){ return {}; }).then(function(j){
          appendSystemLine("Stop failed: " + ((j && j.error) || ("HTTP " + res.status)));
        });
      }
      // Success: the /api/chat stream ends on its own (stdout EOF -> atlas_done),
      // which re-enables the composer.
    }).catch(function(err){ appendSystemLine("Stop failed: " + err.message); });
  }

  function handleChatEvent(obj){
    if(!obj || !obj.type) return;
    if(obj.type === "atlas_started"){
      if(typeof obj.pid === "number") state.chat.pid = obj.pid;
      return;
    }
    if(obj.type === "system" && obj.subtype === "init"){
      if(state.chat.mode === "new" && obj.session_id){
        state.chat.mode = "existing";
        state.chat.selectedSessionId = obj.session_id;
        hideNewSessionPanel();
        appendSystemLine("session " + String(obj.session_id).slice(0, 8) + " started");
      }
      return;
    }
    if(obj.type === "assistant"){
      var blocks = (obj.message && Array.isArray(obj.message.content)) ? obj.message.content : [];
      blocks.forEach(function(b){
        if(!b || !b.type) return;
        if(b.type === "text" && typeof b.text === "string"){ liveAppendText(b.text); }
        else if(b.type === "thinking"){ liveAppendThinking(b.thinking || b.text || ""); }
        else if(b.type === "tool_use"){ liveAppendChip(b); }
      });
      return;
    }
    if(obj.type === "user"){
      // tool_result blocks arrive in user-type stream events; keyed by tool_use_id.
      var ublocks = (obj.message && Array.isArray(obj.message.content)) ? obj.message.content : [];
      ublocks.forEach(function(b){
        if(b && b.type === "tool_result"){ liveResolveToolResult(b); }
      });
      return;
    }
    if(obj.type === "result"){
      removeTyping();
      finalizeTurn(obj);
      return;
    }
    if(obj.type === "atlas_done"){
      removeTyping();
      setComposerBusy(false);
      state.chat.pid = null;
      refreshSidebarAfterChat();
      return;
    }
    // hook_started / hook_response / other system events: ignored silently
  }

  function streamSSE(body){
    var reader = body.getReader();
    var decoder = new TextDecoder();
    var buffer = "";
    function pump(){
      return reader.read().then(function(result){
        if(result.done){
          removeTyping();
          setComposerBusy(false);
          return;
        }
        buffer += decoder.decode(result.value, {stream: true});
        var events = buffer.split("\n\n");
        buffer = events.pop();
        events.forEach(function(evt){
          evt.split("\n").forEach(function(line){
            line = line.trim();
            if(line.indexOf("data:") === 0){
              var jsonStr = line.slice(5).trim();
              if(!jsonStr) return;
              try{ handleChatEvent(JSON.parse(jsonStr)); }catch(e){ /* ignore malformed line */ }
            }
          });
        });
        return pump();
      });
    }
    return pump().catch(function(err){
      removeTyping();
      appendSystemLine("Stream error: " + err.message);
      setComposerBusy(false);
    });
  }

  function onSendOrStop(){
    if(state.chat.streaming){ stopChat(); }
    else { sendComposer(); }
  }

  function sendComposer(){
    if(state.chat.streaming || state.chat.runDisabled) return;
    var text = composerEl.value;
    if(!text.trim()) return;
    var resumeId = state.chat.mode === "existing" ? state.chat.selectedSessionId : null;
    var payload = {
      prompt: text,
      resume: resumeId,
      cwd: state.chat.newCwd || null,
      permissionMode: state.chat.newPermissionMode || "default"
    };
    appendUserBubbleLive(text);
    composerEl.value = "";
    closeSkillPopup();
    resetLiveState();
    setComposerBusy(true);
    showTyping();

    fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    }).then(function(res){
      if(res.status === 403){
        return res.json().catch(function(){ return {}; }).then(function(j){
          removeTyping();
          showRunDisabledBanner(j.error);
          setComposerBusy(false);
          throw new Error("__handled__");
        });
      }
      if(res.status === 429){
        removeTyping();
        appendSystemLine("Too many concurrent chat sessions (max 3) — try again shortly.");
        setComposerBusy(false);
        throw new Error("__handled__");
      }
      if(!res.ok || !res.body){
        return res.json().catch(function(){ return {}; }).then(function(j){
          throw new Error((j && j.error) || ("HTTP " + res.status));
        });
      }
      return streamSSE(res.body);
    }).catch(function(err){
      if(err.message !== "__handled__"){
        removeTyping();
        appendSystemLine("Error: " + err.message);
      }
      setComposerBusy(false);
    });
  }
