  function selectMemoryFile(file, rowEl){
    var listEl = $("memoryList");
    listEl.querySelectorAll(".memory-row").forEach(function(r){ r.classList.remove("active"); });
    if(rowEl) rowEl.classList.add("active");
    var contentEl = $("memoryContent");
    contentEl.innerHTML = '<div class="stats" style="padding:14px;">Loading…</div>';
    fetchText("/api/memory/read?file=" + encodeURIComponent(file)).then(function(text){
      // Spec: raw markdown body. Tolerate a JSON-wrapped {"content": "..."} response too.
      var body = text;
      var trimmed = text.trim();
      if(trimmed.charAt(0) === "{"){
        try{
          var parsed = JSON.parse(trimmed);
          if(parsed && typeof parsed.content === "string") body = parsed.content;
        }catch(e){ /* not JSON — treat as raw markdown */ }
      }
      contentEl.innerHTML = '<div class="md-rendered">' + renderMarkdown(body) + "</div>";
    }).catch(function(err){
      contentEl.innerHTML = '<div class="stats" style="padding:14px;">Failed to load — ' +
        escapeHtml(err.message) + "</div>";
    });
  }

  // ---------- Fusion ----------
  function computeFusionGroups(){
    var d = state.data;
    var parent = new Map();
    d.sessions.forEach(function(s){ parent.set(s.i, s.i); });
    function find(x){
      while(parent.get(x) !== x){
        parent.set(x, parent.get(parent.get(x)));
        x = parent.get(x);
      }
      return x;
    }
    function union(a, b){
      var ra = find(a), rb = find(b);
      if(ra !== rb) parent.set(ra, rb);
    }
    d.edges.forEach(function(e){
      if(e[2] >= state.fusionThreshold) union(e[0], e[1]);
    });
    var groups = new Map();
    d.sessions.forEach(function(s){
      var r = find(s.i);
      if(!groups.has(r)) groups.set(r, []);
      groups.get(r).push(s);
    });
    var result = [];
    groups.forEach(function(g){ if(g.length > 1) result.push(g); });
    result.sort(function(a,b){ return b.length - a.length; });
    return result;
  }

  function renderFusion(){
    var listEl = $("fusionList");
    if(!state.data){ listEl.innerHTML = ""; return; }
    var q = state.search.trim().toLowerCase();
    var groups = computeFusionGroups();
    var visibleGroups = q ? groups.filter(function(g){
      return g.some(function(s){ return sessionMatches(s, q); });
    }) : groups;

    $("fusionSummary").textContent = visibleGroups.length + " candidate group" + (visibleGroups.length === 1 ? "" : "s");

    if(visibleGroups.length === 0){
      listEl.innerHTML = '<div class="stats" style="padding:10px;">No fusion candidates at this threshold' +
        (q ? " matching search." : ".") + "</div>";
      return;
    }

    var html = "";
    visibleGroups.forEach(function(g, idx){
      var termFreq = new Map();
      g.forEach(function(s){
        (s.terms || []).forEach(function(t){ termFreq.set(t, (termFreq.get(t) || 0) + 1); });
      });
      var sharedTerms = Array.from(termFreq.entries())
        .sort(function(a,b){ return b[1] - a[1]; })
        .slice(0, 5).map(function(e){ return e[0]; });
      var ids = g.map(function(s){ return s.id; });
      var membersHtml = g.map(function(s){
        return '<div class="fusion-member" data-i="' + s.i + '"><span>' +
          escapeHtml(truncate(s.title, 52)) + '</span><span class="chip-time">' +
          fmtRelative(s.mtime) + "</span></div>";
      }).join("");
      var termsHtml = sharedTerms.map(function(t){
        return '<span class="term-tag">' + escapeHtml(t) + "</span>";
      }).join(" ") || "—";

      html += '<div class="fusion-group">' +
        '<div class="cluster-card-header"><span>Group ' + (idx+1) + '</span>' +
        '<span class="badge">' + g.length + " sessions</span></div>" +
        '<div class="fusion-members">' + membersHtml + "</div>" +
        '<div class="detail-label">shared terms</div><div>' + termsHtml + "</div>" +
        '<div class="proposal-box">Same topic — candidates to merge/compact.' +
        '<div style="margin-top:6px;"><button class="copy-btn" data-ids="' +
        escapeHtml(ids.join(",")) + '">Copy id list</button></div></div>' +
        "</div>";
    });

    listEl.innerHTML = html;
    listEl.querySelectorAll(".fusion-member").forEach(function(el){
      el.addEventListener("click", function(){ openDetail(parseInt(el.dataset.i, 10)); });
    });
    listEl.querySelectorAll(".copy-btn[data-ids]").forEach(function(el){
      el.addEventListener("click", function(){ copyText(el.dataset.ids); });
    });
  }

  // ---------- Detail panel ----------
  function clusterLabelOf(cid){
    var lbl = null;
    (state.data && state.data.clusters || []).forEach(function(c){ if(c.id === cid) lbl = c.label; });
    return lbl || ("region " + cid);
  }
  function clusterSizeOf(cid){
    var sz = 0;
    (state.data && state.data.clusters || []).forEach(function(c){ if(c.id === cid) sz = c.size || 0; });
    return sz;
  }

  // Top-k terms for a session: weighted `tw` when present, else the flat `terms`.
  function topTermsOf(i, s, k){
    k = k || 3;
    var m = state.twByIndex && state.twByIndex.get(i);
    if(m && m.size){
      return Array.from(m.entries()).sort(function(a, b){ return b[1] - a[1]; })
        .slice(0, k).map(function(p){ return p[0]; });
    }
    return (s.terms || []).slice(0, k);
  }

  function joinTerms(arr){
    if(!arr.length) return "various topics";
    if(arr.length === 1) return "<strong>" + escapeHtml(arr[0]) + "</strong>";
    var head = arr.slice(0, -1).map(function(t){ return "<strong>" + escapeHtml(t) + "</strong>"; });
    return head.join(", ") + " and <strong>" + escapeHtml(arr[arr.length - 1]) + "</strong>";
  }

  function factsHtml(s){
    return '<div class="detail-row"><div class="detail-label">Project</div><div>' + escapeHtml(s.projectLabel || s.project) + "</div></div>" +
      '<div class="detail-row"><div class="detail-label">Modified</div><div>' + fmtDateTime(s.mtime) +
        ' <span style="color:var(--muted);">(' + fmtRelative(s.mtime) + ")</span></div></div>" +
      '<div class="detail-row"><div class="detail-label">Messages</div><div>' + s.msgs + "</div></div>" +
      '<div class="detail-row"><div class="detail-label">Size</div><div>' + s.kb + " KB</div></div>" +
      '<div class="detail-row"><div class="detail-label">Resume</div>' +
        '<div class="resume-box"><code id="resumeCode">claude --resume ' + escapeHtml(s.id) + "</code>" +
        '<button class="copy-btn" id="copyResumeBtn">Copy</button></div></div>';
  }

  function wireDetailCommon(s){
    var copyBtn = $("copyResumeBtn");
    if(copyBtn) copyBtn.addEventListener("click", function(){ copyText("claude --resume " + s.id); });
    var openInChatBtn = $("openInChatBtn");
    if(openInChatBtn){
      openInChatBtn.onclick = function(){ openInChat(s); };
    }
  }

  // mode: "stats" (tiles/tree/fusion) or "story" (graph clicks)
  function openDetail(i, mode){
    var s = state.sessionByIndex.get(i);
    if(!s) return;
    state.selectedIndex = i;
    mode = mode || "stats";

    if(mode === "story"){
      $("detailTitle").textContent = "Session · story";
      var terms = topTermsOf(i, s, 3);
      var lead = "Mostly about " + joinTerms(terms) + " — part of the '" +
        escapeHtml(clusterLabelOf(s.cluster)) + "' region (" + clusterSizeOf(s.cluster) +
        " related session" + (clusterSizeOf(s.cluster) === 1 ? "" : "s") + "), last touched " +
        escapeHtml(fmtRelative(s.mtime)) + ".";

      var conns = (state.neighbors.get(i) || []).filter(function(nb){
        return nb.w >= state.edgeThreshold;
      });
      var connHtml;
      if(!conns.length){
        connHtml = '<div class="stats" style="padding:6px 2px;">No links above the current threshold (' +
          state.edgeThreshold.toFixed(2) + "). Lower the edge slider to reveal weaker ties.</div>";
      } else {
        connHtml = conns.map(function(nb){
          var ns = state.sessionByIndex.get(nb.i);
          var shared = sharedTermsBetween(i, nb.i, 2);
          var linkedBy = shared.length
            ? 'linked by: ' + shared.map(function(t){ return "<b>" + escapeHtml(t) + "</b>"; }).join(", ")
            : "weak topical overlap";
          var pct = Math.max(4, Math.min(100, Math.round(nb.w * 100)));
          return '<div class="story-conn" data-goto="' + nb.i + '">' +
            '<div class="story-conn-top"><span class="story-conn-title">' +
              escapeHtml(truncate(ns ? ns.title : "?", 40)) + "</span>" +
              '<span class="story-conn-w">' + nb.w.toFixed(2) + "</span></div>" +
            '<div class="story-conn-bar"><span style="width:' + pct + '%"></span></div>' +
            '<div class="story-conn-terms">' + linkedBy + "</div></div>";
        }).join("");
      }

      $("detailBody").innerHTML =
        '<div class="story-lead">' + lead + "</div>" +
        '<div class="story-actions">' +
          '<button class="story-btn primary" id="askAboutBtn">Ask about this session</button>' +
          '<button class="story-btn" id="openInChat2Btn">Open in Chat</button>' +
        "</div>" +
        '<div class="detail-row"><div class="detail-label">Connections</div>' + connHtml + "</div>" +
        factsHtml(s);

      $("detailBody").querySelectorAll(".story-conn").forEach(function(el){
        el.addEventListener("click", function(){ graphSelectNode(parseInt(el.dataset.goto, 10)); });
      });
      var askBtn = $("askAboutBtn");
      if(askBtn) askBtn.addEventListener("click", function(){ askAboutSession(s); });
      var oic2 = $("openInChat2Btn");
      if(oic2) oic2.addEventListener("click", function(){ openInChat(s); });
      wireDetailCommon(s);
      $("detailPanel").classList.add("open");
      Graph.setSelected(i);
      return;
    }

    // ---- stats mode (unchanged content) ----
    $("detailTitle").textContent = "Session detail";
    var neighbors = (state.neighbors.get(i) || []).slice(0, 5);
    var neighborsHtml = neighbors.map(function(nb){
      var ns = state.sessionByIndex.get(nb.i);
      return '<div class="neighbor-row" data-goto="' + nb.i + '"><span>' +
        escapeHtml(truncate(ns ? ns.title : "?", 36)) + "</span><span>" +
        nb.w.toFixed(3) + "</span></div>";
    }).join("") || '<div class="stats">none above 0.15</div>';
    var termsHtml = (s.terms || []).map(function(t){
      return '<span class="term-tag">' + escapeHtml(t) + "</span>";
    }).join(" ") || "—";

    $("detailBody").innerHTML =
      '<div class="detail-row"><div class="detail-label">Title</div><div>' + escapeHtml(s.title) + "</div></div>" +
      '<div class="detail-row"><div class="detail-label">Project</div><div>' + escapeHtml(s.projectLabel || s.project) + "</div></div>" +
      '<div class="detail-row"><div class="detail-label">Modified</div><div>' + fmtDateTime(s.mtime) +
        ' <span style="color:var(--muted);">(' + fmtRelative(s.mtime) + ")</span></div></div>" +
      '<div class="detail-row"><div class="detail-label">Messages</div><div>' + s.msgs + "</div></div>" +
      '<div class="detail-row"><div class="detail-label">Size</div><div>' + s.kb + " KB</div></div>" +
      '<div class="detail-row"><div class="detail-label">Terms</div><div>' + termsHtml + "</div></div>" +
      '<div class="detail-row"><div class="detail-label">Strongest neighbors</div>' + neighborsHtml + "</div>" +
      '<div class="detail-row"><div class="detail-label">Resume</div>' +
        '<div class="resume-box"><code id="resumeCode">claude --resume ' + escapeHtml(s.id) + "</code>" +
        '<button class="copy-btn" id="copyResumeBtn">Copy</button></div></div>';

    $("detailBody").querySelectorAll(".neighbor-row").forEach(function(el){
      el.addEventListener("click", function(){ openDetail(parseInt(el.dataset.goto, 10)); });
    });
    wireDetailCommon(s);
    $("detailPanel").classList.add("open");
    Graph.setSelected(i);
  }

  // Graph node click / connection click: pin focus AND open the story panel.
  function graphSelectNode(i){
    Graph.focusNode(i);
    state.graph.isolatedCluster = null;
    renderGraphLegend();
    openDetail(i, "story");
  }
  function onGraphNodeClick(i){ graphSelectNode(i); }
  function onGraphBackground(){
    if(Graph.clearGraphSelection()){
      state.graph.isolatedCluster = null;
      renderGraphLegend();
      closeDetail();
    }
  }

  function askAboutSession(s){
    closeDetail();
    switchTab("chat");
    selectChatSession(s.id, s.project);
    if(composerEl){
      composerEl.value = "Recap this session: what was done, what was decided, and what state is it in now?";
      composerEl.focus();
    }
  }

  function closeDetail(){
    $("detailPanel").classList.remove("open");
    state.selectedIndex = null;
    Graph.setSelected(null);
  }

  // ---------- wiring ----------
  function capitalize(s){ return s.charAt(0).toUpperCase() + s.slice(1); }

  function switchTab(v){
    document.querySelectorAll(".tab-btn").forEach(function(b){
      b.classList.toggle("active", b.dataset.view === v);
    });
    document.querySelectorAll(".view").forEach(function(el){ el.classList.remove("active"); });
    $("view" + capitalize(v)).classList.add("active");
    state.view = v;
    if(v === "graph"){ Graph.activate(); } else { Graph.deactivate(); }
  }

  document.querySelectorAll(".tab-btn").forEach(function(btn){
    btn.addEventListener("click", function(){ switchTab(btn.dataset.view); });
  });

  // ---------- Chat wiring ----------
  composerEl = $("chatComposer");

  $("chatSearchInput").addEventListener("input", function(){
    state.chat.sidebarFilter = $("chatSearchInput").value;
    renderChatSidebar();
  });

  $("newSessionBtn").addEventListener("click", function(){
    var panel = $("newSessionPanel");
    if(panel.style.display === "none" || !panel.style.display){
      showNewSessionPanel();
    } else {
      hideNewSessionPanel();
    }
  });

  $("newSessionCwdSelect").addEventListener("change", function(){
    state.chat.newCwd = $("newSessionCwdSelect").value;
    $("newSessionCwdInput").value = "";
  });

  $("newSessionCwdInput").addEventListener("input", function(){
    state.chat.newCwd = $("newSessionCwdInput").value;
    $("newSessionCwdSelect").value = "";
  });

  $("newSessionPermSelect").addEventListener("change", function(){
    state.chat.newPermissionMode = $("newSessionPermSelect").value;
  });

  $("chatSendBtn").addEventListener("click", onSendOrStop);

  composerEl.addEventListener("input", function(){
    updateSkillPopup();
  });

  composerEl.addEventListener("keydown", function(ev){
    if(state.chat.skillPopupOpen && (ev.key === "ArrowDown" || ev.key === "ArrowUp")){
      ev.preventDefault();
      moveSkillPopupSelection(ev.key === "ArrowDown" ? 1 : -1);
      return;
    }
    if(state.chat.skillPopupOpen && ev.key === "Tab"){
      ev.preventDefault();
      acceptSkillSuggestion();
      return;
    }
    if(ev.key === "Enter" && !ev.shiftKey){
      ev.preventDefault();
      if(state.chat.skillPopupOpen){
        acceptSkillSuggestion();
      } else {
        sendComposer();
      }
      return;
    }
    if(ev.key === "Escape" && state.chat.skillPopupOpen){
      ev.stopPropagation();
      closeSkillPopup();
    }
  });

  $("searchInput").addEventListener("input", function(){
    state.search = $("searchInput").value;
    renderTiles();
    renderTree();
    renderFusion();
  });

  $("edgeSlider").addEventListener("input", function(){
    state.edgeThreshold = parseFloat($("edgeSlider").value);
    $("edgeVal").textContent = state.edgeThreshold.toFixed(2);
    if(state.data) Graph.rebuildSprings();
  });

  $("fusionSlider").addEventListener("input", function(){
    state.fusionThreshold = parseFloat($("fusionSlider").value);
    $("fusionVal").textContent = state.fusionThreshold.toFixed(2);
    if(state.data) renderFusion();
  });

  $("refreshBtn").addEventListener("click", function(){
    var btn = $("refreshBtn");
    var orig = btn.textContent;
    btn.disabled = true;
    btn.textContent = "Refreshing…";
    fetch("/refresh", {method:"POST"}).then(function(res){
      return res.json().catch(function(){ return {}; }).then(function(j){
        if(!res.ok || j.ok === false) throw new Error(j.error || ("HTTP " + res.status));
        return loadData();
      });
    }).catch(function(err){
      showError("Refresh failed — " + err.message);
    }).finally(function(){
      btn.disabled = false;
      btn.textContent = orig;
    });
  });

  $("retryBtn").addEventListener("click", function(){
    hideError();
    loadData();
  });

  $("detailClose").addEventListener("click", closeDetail);

  // ---------- Theme ----------
  function applyTheme(theme){
    state.theme = theme;
    if(theme === "light") document.documentElement.setAttribute("data-theme", "light");
    else document.documentElement.removeAttribute("data-theme");
    try{ localStorage.setItem("atlas-theme", theme); }catch(e){}
    var btn = $("themeToggle");
    if(btn){ btn.textContent = theme === "light" ? "☀" : "☾"; }
    readTheme();
    Graph.redraw();
    // Some engines don't repaint text/bg colors driven by CSS vars inside an
    // already-scrolled container until a reflow — nudge the transcript's paint
    // without touching layout or scroll position.
    var tr = $("chatTranscript");
    if(tr){
      tr.style.opacity = "0.999";
      requestAnimationFrame(function(){ tr.style.opacity = ""; });
    }
  }
  function toggleTheme(){ applyTheme(state.theme === "light" ? "dark" : "light"); }
  function initTheme(){
    var t = "dark";
    try{ if(localStorage.getItem("atlas-theme") === "light") t = "light"; }catch(e){}
    applyTheme(t);
  }
  $("themeToggle").addEventListener("click", toggleTheme);

  // ---------- Responsive chat sidebar (overlay < 900px) ----------
  function toggleChatSidebar(force){
    var sb = $("chatSidebar"), scrim = $("chatScrim");
    if(!sb) return;
    var open = (force != null) ? force : !sb.classList.contains("open");
    sb.classList.toggle("open", open);
    if(scrim) scrim.classList.toggle("show", open);
  }
  $("chatSidebarToggle").addEventListener("click", function(){ toggleChatSidebar(); });
  $("chatScrim").addEventListener("click", function(){ toggleChatSidebar(false); });

  // ---------- Command palette ----------
  function subseqScore(q, target){
    if(!q) return 1;
    var t = String(target).toLowerCase();
    q = q.toLowerCase();
    var ti = 0, score = 0, last = -2, streak = 0, first = -1;
    for(var qi = 0; qi < q.length; qi++){
      var ch = q.charAt(qi), found = -1;
      for(var k = ti; k < t.length; k++){ if(t.charAt(k) === ch){ found = k; break; } }
      if(found === -1) return -1;
      if(first === -1) first = found;
      if(found === last + 1){ streak++; score += 3 + streak; }
      else { streak = 0; score += 1; }
      last = found; ti = found + 1;
    }
    score += Math.max(0, 10 - first);
    return score;
  }

  function buildPaletteItems(){
    var items = [];
    var tabs = [["chat","Chat"],["projects","Projects"],["skills","Skills"],["memory","Memory"],
                ["tiles","Tiles"],["tree","Tree"],["graph","Graph"],["fusion","Fusion"]];
    tabs.forEach(function(t){
      items.push({sec:"action", label:"Go to " + t[1], run:function(){ switchTab(t[0]); }});
    });
    items.push({sec:"action", label:"New session", run:function(){
      switchTab("chat"); showNewSessionPanel(); if(composerEl) composerEl.focus();
    }});
    items.push({sec:"action", label:"Toggle theme", run:toggleTheme});
    items.push({sec:"action", label:"Refresh index", run:function(){ $("refreshBtn").click(); }});

    var sessions = (state.data && state.data.sessions) ? state.data.sessions : [];
    sessions.forEach(function(s){
      items.push({sec:"session", label:s.title, sub:(s.projectLabel || s.project || ""),
        run:function(){ switchTab("chat"); selectChatSession(s.id, s.project); }});
    });
    state.projects.forEach(function(p){
      items.push({sec:"project", label:(p.label || p.dir), sub:(p.sessions || 0) + " sessions",
        run:function(){
          state.chat.projectFilter = p.dir; state.chat.sidebarFilter = "";
          var si = $("chatSearchInput"); if(si) si.value = "";
          switchTab("chat"); renderChatSidebar();
        }});
    });
    state.skills.forEach(function(sk){
      items.push({sec:"skill", label:"/" + sk.name, sub:(sk.description || ""),
        run:function(){ switchTab("chat"); if(composerEl){ composerEl.value = "/" + sk.name + " "; composerEl.focus(); } }});
    });
    return items;
  }

  function filterPalette(q){
    var all = state.palette.allItems || [];
    var result;
    if(!q){
      result = all.slice();
    } else {
      result = all.map(function(it){
        var hay = it.label + " " + (it.sub || "") + " " + it.sec;
        return {it: it, score: subseqScore(q, hay)};
      }).filter(function(x){ return x.score >= 0; })
        .sort(function(a, b){ return b.score - a.score; })
        .map(function(x){ return x.it; });
    }
    state.palette.items = result.slice(0, 12);
    state.palette.index = 0;
    renderPalette();
  }

  function renderPalette(){
    var el = $("paletteResults");
    var items = state.palette.items;
    if(!items.length){ el.innerHTML = '<div class="palette-empty">No matches.</div>'; return; }
    el.innerHTML = items.map(function(it, idx){
      return '<div class="palette-item' + (idx === state.palette.index ? " active" : "") + '" data-idx="' + idx + '">' +
        '<span class="palette-sec">' + escapeHtml(it.sec) + '</span>' +
        '<span class="palette-label">' + escapeHtml(it.label) +
        (it.sub ? '<span class="palette-sub">' + escapeHtml(truncate(it.sub, 60)) + "</span>" : "") +
        "</span></div>";
    }).join("");
    el.querySelectorAll(".palette-item").forEach(function(row){
      row.addEventListener("click", function(){ runPaletteItem(parseInt(row.dataset.idx, 10)); });
    });
    var active = el.querySelector(".palette-item.active");
    if(active && active.scrollIntoView) active.scrollIntoView({block:"nearest"});
  }

  function movePalette(delta){
    var n = state.palette.items.length;
    if(!n) return;
    state.palette.index = (state.palette.index + delta + n) % n;
    renderPalette();
  }

  function runPaletteItem(idx){
    var it = state.palette.items[idx];
    if(!it) return;
    closePalette();
    try{ it.run(); }catch(e){}
  }

  function openPalette(){
    state.palette.open = true;
    state.palette.allItems = buildPaletteItems();
    $("paletteOverlay").classList.add("show");
    var input = $("paletteInput");
    input.value = "";
    filterPalette("");
    input.focus();
  }
  function closePalette(){
    state.palette.open = false;
    $("paletteOverlay").classList.remove("show");
  }
  function togglePalette(){ state.palette.open ? closePalette() : openPalette(); }

  $("paletteBtn").addEventListener("click", openPalette);
  $("paletteInput").addEventListener("input", function(){ filterPalette(this.value.trim()); });
  $("paletteInput").addEventListener("keydown", function(ev){
    if(ev.key === "ArrowDown"){ ev.preventDefault(); movePalette(1); }
    else if(ev.key === "ArrowUp"){ ev.preventDefault(); movePalette(-1); }
    else if(ev.key === "Enter"){ ev.preventDefault(); runPaletteItem(state.palette.index); }
    else if(ev.key === "Escape"){ ev.preventDefault(); ev.stopPropagation(); closePalette(); }
  });
  $("paletteOverlay").addEventListener("click", function(ev){
    if(ev.target === $("paletteOverlay")) closePalette();
  });

  // ---------- Graph legend collapse + "/" to search ----------
  $("legendToggle").addEventListener("click", function(){
    var lg = $("graphLegend");
    var collapsed = lg.classList.toggle("collapsed");
    this.textContent = collapsed ? "+" : "–";
    this.title = collapsed ? "Expand legend" : "Collapse legend";
  });

  function isTypingTarget(el){
    if(!el) return false;
    var tag = el.tagName;
    return tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT" || el.isContentEditable;
  }

  // ---------- Global keys ----------
  document.addEventListener("keydown", function(ev){
    if((ev.metaKey || ev.ctrlKey) && (ev.key === "k" || ev.key === "K")){
      ev.preventDefault();
      togglePalette();
      return;
    }
    if(ev.key === "/" && state.view === "graph" && !state.palette.open && !isTypingTarget(document.activeElement)){
      ev.preventDefault();
      var si = $("searchInput");
      if(si) si.focus();
      return;
    }
    if(ev.key === "Escape"){
      if(state.palette.open){ closePalette(); return; }
      if(state.chat.skillPopupOpen){ closeSkillPopup(); return; }
      var nsp = $("newSessionPanel");
      if(nsp && nsp.style.display !== "none" && nsp.style.display !== ""){ hideNewSessionPanel(); return; }
      // clear graph focus / isolate before closing the panel
      if(Graph.anyGraphSelection && Graph.anyGraphSelection()){
        Graph.clearGraphSelection();
        state.graph.isolatedCluster = null;
        renderGraphLegend();
        closeDetail();
        return;
      }
      closeDetail();
    }
  });

  // ---------- Delegated clicks: code copy, tool-chip + thinking expand ----------
  document.addEventListener("click", function(ev){
    var t = ev.target;
    if(!t || !t.closest) return;
    var copyBtn = t.closest(".md-copy");
    if(copyBtn){
      var box = copyBtn.closest(".md-code");
      var codeEl = box && box.querySelector("pre code");
      if(codeEl){
        copyText(codeEl.textContent);
        var orig = copyBtn.textContent;
        copyBtn.classList.add("copied");
        copyBtn.textContent = "Copied";
        setTimeout(function(){ copyBtn.classList.remove("copied"); copyBtn.textContent = orig; }, 1200);
      }
      return;
    }
    var chipHead = t.closest(".tool-chip-head");
    if(chipHead && chipHead.parentNode){ chipHead.parentNode.classList.toggle("expanded"); return; }
    var thinkHead = t.closest(".md-thinking-head");
    if(thinkHead && thinkHead.parentNode){ thinkHead.parentNode.classList.toggle("expanded"); return; }
  });

  // ---------- init ----------
  initTheme();
  Graph.init();
  loadData();
  loadProjects();
  loadSkills();
  loadMemoryList();

  // Test-only hook (never present for real users): exposes graph geometry +
  // selection helpers so Playwright can drive real canvas interactions.
  if(location.search.indexOf("__test=1") >= 0){
    window.__atlas = {
      screenPosOf: function(i){ return Graph.screenPosOf(i); },
      debugScores: function(q){ return Graph.debugScores(q); },
      focusSize: function(){ return Graph.focusSize(); },
      selectNode: function(i){ graphSelectNode(i); },
      state: state
    };
  }

})();
</script>
</body>
