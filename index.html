<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Atlas</title>
<style>
  :root{
    --bg:#0d1117;
    --panel:#161b22;
    --border:#30363d;
    --text:#c9d1d9;
    --accent:#58a6ff;
    --muted:#8b949e;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    display:flex;flex-direction:column;height:100vh;overflow:hidden;
    background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    font-size:14px;
  }
  button, input{font-family:inherit;}

  /* ---------- header ---------- */
  .header{
    flex:0 0 auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--border);
  }
  .wordmark{font-weight:800;letter-spacing:1.5px;color:var(--accent);font-size:15px;white-space:nowrap;}
  .stats{color:var(--muted);font-size:12px;white-space:nowrap;}
  #searchInput{
    background:var(--bg);border:1px solid var(--border);color:var(--text);
    border-radius:6px;padding:6px 10px;font-size:13px;flex:1 1 160px;min-width:140px;max-width:320px;
  }
  #searchInput:focus{outline:none;border-color:var(--accent);}
  .slider-group{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);white-space:nowrap;}
  .slider-group input[type=range]{accent-color:var(--accent);width:120px;}
  .slider-group span.val{color:var(--text);min-width:34px;display:inline-block;}
  #refreshBtn{
    background:var(--bg);border:1px solid var(--border);color:var(--text);
    border-radius:6px;padding:6px 14px;cursor:pointer;font-size:12px;
  }
  #refreshBtn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
  #refreshBtn:disabled{opacity:.5;cursor:default;}
  .tabs{display:flex;gap:4px;margin-left:auto;}
  .tab-btn{
    background:transparent;border:1px solid var(--border);color:var(--muted);
    padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;
  }
  .tab-btn:hover:not(.active){color:var(--text);border-color:var(--accent);}
  .tab-btn.active{background:var(--accent);color:#0d1117;border-color:var(--accent);font-weight:700;}

  /* ---------- main / views ---------- */
  .main{flex:1 1 auto;position:relative;overflow:hidden;}
  .view{position:absolute;inset:0;display:none;overflow:hidden;}
  .view.active{display:flex;flex-direction:column;}

  /* Tiles */
  .cluster-grid{
    flex:1 1 auto;overflow-y:auto;padding:16px;
    display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;align-content:start;
  }
  .cluster-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:10px;}
  .cluster-card-header{display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px;}
  .cluster-dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto;}
  .badge{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:1px 8px;font-size:11px;color:var(--muted);margin-left:auto;}
  .chip-list{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{
    background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 8px;
    font-size:12px;cursor:pointer;max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .chip:hover{border-color:var(--accent);color:var(--accent);}
  .chip .chip-time{color:var(--muted);margin-left:6px;font-size:11px;}

  /* Tree */
  .tree-container{flex:1 1 auto;overflow:auto;padding:16px;}
  .tree-container details{margin-bottom:2px;}
  .tree-container summary{cursor:pointer;padding:5px 8px;border-radius:4px;list-style:revert;font-size:13px;}
  .tree-container summary:hover{background:var(--panel);}
  .tree-session{
    padding:4px 8px 4px 30px;font-size:12px;cursor:pointer;border-radius:4px;color:var(--text);
    display:flex;justify-content:space-between;gap:8px;
  }
  .tree-session:hover{background:var(--panel);color:var(--accent);}

  /* Graph */
  #viewGraph{position:relative;}
  #graphCanvas{position:absolute;inset:0;width:100%;height:100%;cursor:grab;display:block;}
  #graphCanvas.dragging{cursor:grabbing;}
  .graph-hud{
    position:absolute;left:12px;bottom:12px;background:rgba(22,27,34,.85);
    border:1px solid var(--border);padding:6px 10px;border-radius:6px;font-size:11px;color:var(--muted);
    pointer-events:none;
  }

  /* Fusion */
  .fusion-controls{
    flex:0 0 auto;padding:10px 16px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted);
  }
  .fusion-list{flex:1 1 auto;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;}
  .fusion-group{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;}
  .fusion-members{display:flex;flex-direction:column;gap:2px;margin:8px 0;}
  .fusion-member{
    font-size:12px;display:flex;justify-content:space-between;gap:8px;cursor:pointer;
    padding:3px 4px;border-radius:4px;
  }
  .fusion-member:hover{background:var(--bg);color:var(--accent);}
  .proposal-box{background:var(--bg);border:1px dashed var(--border);border-radius:6px;padding:8px;margin-top:8px;font-size:12px;color:var(--muted);}
  .copy-btn{
    background:var(--panel);border:1px solid var(--border);color:var(--text);
    border-radius:4px;padding:3px 10px;cursor:pointer;font-size:11px;
  }
  .copy-btn:hover{border-color:var(--accent);color:var(--accent);}
  .term-tag{
    display:inline-block;background:var(--bg);border:1px solid var(--border);border-radius:4px;
    padding:2px 6px;font-size:11px;margin:2px 4px 2px 0;color:var(--text);
  }

  /* Detail panel */
  .detail-panel{
    position:absolute;top:0;right:-380px;width:360px;max-width:92vw;height:100%;
    background:var(--panel);border-left:1px solid var(--border);
    transition:right .18s ease;overflow-y:auto;z-index:30;box-shadow:-6px 0 24px rgba(0,0,0,.5);
  }
  .detail-panel.open{right:0;}
  .detail-header{
    display:flex;align-items:center;justify-content:space-between;padding:12px 14px;
    border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel);z-index:1;
  }
  .close-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:4px;}
  .close-btn:hover{color:var(--text);}
  .detail-body{padding:14px;font-size:13px;line-height:1.55;}
  .detail-row{margin-bottom:12px;}
  .detail-label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;}
  .neighbor-row{
    display:flex;justify-content:space-between;gap:8px;padding:5px 2px;border-bottom:1px solid var(--border);
    cursor:pointer;font-size:12px;
  }
  .neighbor-row:hover{color:var(--accent);}
  .resume-box{
    display:flex;gap:6px;align-items:center;background:var(--bg);border:1px solid var(--border);
    border-radius:6px;padding:6px 8px;margin-top:4px;
  }
  .resume-box code{flex:1;overflow-x:auto;white-space:nowrap;font-family:Consolas,"Courier New",monospace;font-size:11px;}

  /* Error overlay */
  #errorOverlay{
    position:fixed;inset:0;background:rgba(13,17,23,.92);display:none;
    align-items:center;justify-content:center;z-index:100;flex-direction:column;
  }
  #errorOverlay.show{display:flex;}
  .error-box{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:26px 32px;text-align:center;max-width:420px;}
  .error-box #errorMessage{color:var(--text);margin-bottom:14px;font-size:13px;}
  .retry-btn{background:var(--accent);color:#0d1117;border:none;border-radius:6px;padding:8px 20px;cursor:pointer;font-weight:700;font-size:13px;}
  .retry-btn:hover{opacity:.9;}

  /* ---------- Chat ---------- */
  .chat-layout{flex:1 1 auto;display:flex;overflow:hidden;min-height:0;}
  .chat-sidebar{
    width:300px;flex:0 0 300px;display:flex;flex-direction:column;
    border-right:1px solid var(--border);overflow:hidden;background:var(--panel);
  }
  #chatSearchInput{
    margin:10px 10px 6px 10px;background:var(--bg);border:1px solid var(--border);color:var(--text);
    border-radius:6px;padding:6px 10px;font-size:13px;
  }
  #chatSearchInput:focus{outline:none;border-color:var(--accent);}
  #newSessionBtn{
    margin:0 10px 8px 10px;background:var(--bg);border:1px solid var(--border);color:var(--text);
    border-radius:6px;padding:7px 10px;cursor:pointer;font-size:12px;text-align:left;
  }
  #newSessionBtn:hover{border-color:var(--accent);color:var(--accent);}
  .new-session-panel{
    margin:0 10px 10px 10px;padding:10px;background:var(--bg);border:1px solid var(--border);
    border-radius:6px;display:flex;flex-direction:column;gap:8px;font-size:11px;color:var(--muted);
  }
  .new-session-panel label{display:flex;flex-direction:column;gap:3px;}
  .new-session-panel select, .new-session-panel input[type=text]{
    background:var(--panel);border:1px solid var(--border);color:var(--text);
    border-radius:4px;padding:5px 7px;font-size:12px;font-family:inherit;
  }
  .chat-session-list{flex:1 1 auto;overflow-y:auto;padding:0 6px 10px 6px;}
  .chat-filter-banner{
    display:flex;align-items:center;justify-content:space-between;gap:6px;
    background:var(--bg);border:1px solid var(--border);border-radius:6px;
    padding:6px 8px;margin:0 4px 8px 4px;font-size:11px;color:var(--muted);
  }
  .chat-cluster-group{margin-bottom:10px;}
  .chat-cluster-header{
    display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.4px;padding:4px 6px;
  }
  .chat-session-item{
    display:flex;justify-content:space-between;gap:8px;padding:6px 8px;border-radius:6px;
    font-size:12px;cursor:pointer;
  }
  .chat-session-item:hover{background:var(--bg);color:var(--accent);}
  .chat-session-item.active{background:var(--accent);color:#0d1117;}
  .chat-main{flex:1 1 auto;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
  .chat-banner{
    flex:0 0 auto;background:#5a1d1d;border-bottom:1px solid #f85149;color:#ffb4ab;
    padding:8px 14px;font-size:12px;
  }
  .chat-transcript{flex:1 1 auto;overflow-y:auto;padding:16px;display:flex;flex-direction:column;}
  .chat-system-line{
    align-self:center;color:var(--muted);font-size:11px;background:var(--panel);
    border:1px solid var(--border);border-radius:10px;padding:3px 10px;margin:6px 0;
  }
  .chat-composer{
    flex:0 0 auto;display:flex;gap:8px;align-items:flex-end;padding:10px 14px;
    border-top:1px solid var(--border);background:var(--panel);position:relative;
  }
  .chat-composer textarea{
    flex:1 1 auto;resize:none;background:var(--bg);border:1px solid var(--border);color:var(--text);
    border-radius:6px;padding:8px 10px;font-size:13px;font-family:inherit;line-height:1.4;
  }
  .chat-composer textarea:focus{outline:none;border-color:var(--accent);}
  .chat-composer textarea:disabled{opacity:.5;}
  #chatSendBtn{
    background:var(--accent);color:#0d1117;border:none;border-radius:6px;
    padding:8px 18px;cursor:pointer;font-weight:700;font-size:13px;
  }
  #chatSendBtn:disabled{opacity:.5;cursor:default;}
  .skill-autocomplete{
    position:absolute;left:14px;right:14px;bottom:100%;margin-bottom:6px;
    background:var(--panel);border:1px solid var(--border);border-radius:8px;
    max-height:220px;overflow-y:auto;box-shadow:0 -6px 20px rgba(0,0,0,.45);z-index:5;
  }
  .skill-ac-item{padding:7px 10px;font-size:12px;cursor:pointer;display:flex;gap:8px;align-items:baseline;}
  .skill-ac-item span{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .skill-ac-item:hover, .skill-ac-item.active{background:var(--bg);}

  .msg-row{display:flex;margin-bottom:10px;}
  .msg-row.user{justify-content:flex-end;}
  .msg-row.assistant{justify-content:flex-start;}
  .msg-bubble{max-width:78%;padding:8px 12px;border-radius:10px;font-size:13px;line-height:1.5;}
  .msg-row.user .msg-bubble{background:var(--accent);color:#0d1117;border-bottom-right-radius:2px;}
  .msg-row.assistant .msg-bubble{background:var(--panel);border:1px solid var(--border);border-bottom-left-radius:2px;}
  .msg-meta{font-size:10px;color:var(--muted);margin-top:4px;}
  .msg-row.user .msg-meta{color:rgba(13,17,23,.6);}
  .md-rendered{white-space:pre-wrap;word-wrap:break-word;}
  .md-rendered code{
    font-family:Consolas,"Courier New",monospace;background:rgba(110,118,129,.25);
    padding:1px 4px;border-radius:4px;font-size:12px;
  }
  .msg-row.user .md-rendered code{background:rgba(13,17,23,.2);}
  .md-rendered pre.md-fence{
    background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px;
    overflow-x:auto;margin:6px 0;white-space:pre;
  }
  .md-rendered pre.md-fence code{background:none;padding:0;}
  .msg-row.user .md-rendered pre.md-fence{background:rgba(13,17,23,.25);border-color:rgba(13,17,23,.3);}

  /* ---------- Projects ---------- */
  .projects-grid{
    flex:1 1 auto;overflow-y:auto;padding:16px;
    display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;align-content:start;
  }
  .project-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;}
  .project-card:hover{border-color:var(--accent);}
  .project-card-label{font-weight:600;font-size:13px;margin-bottom:6px;word-break:break-all;}
  .project-card-meta{font-size:11px;color:var(--muted);}

  /* ---------- Skills ---------- */
  .skills-list{flex:1 1 auto;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;}
  .skill-row{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 14px;cursor:pointer;}
  .skill-row:hover{border-color:var(--accent);}
  .skill-name{font-weight:700;color:var(--accent);font-size:13px;margin-bottom:3px;}
  .skill-desc{font-size:12px;color:var(--muted);}

  /* ---------- Memory ---------- */
  .memory-layout{flex:1 1 auto;display:flex;overflow:hidden;min-height:0;}
  .memory-list{width:260px;flex:0 0 260px;border-right:1px solid var(--border);overflow-y:auto;padding:8px;}
  .memory-row{padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:2px;}
  .memory-row:hover{background:var(--panel);}
  .memory-row.active{background:var(--accent);color:#0d1117;}
  .memory-row.active .memory-desc{color:rgba(13,17,23,.7);}
  .memory-name{font-size:12px;font-weight:600;margin-bottom:2px;}
  .memory-desc{font-size:11px;color:var(--muted);}
  .memory-content{flex:1 1 auto;overflow-y:auto;padding:18px;font-size:13px;line-height:1.6;}
  .memory-content pre.md-fence{
    background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;overflow-x:auto;margin:8px 0;
  }
  .memory-content code{
    font-family:Consolas,"Courier New",monospace;background:rgba(110,118,129,.25);
    padding:1px 4px;border-radius:4px;font-size:12px;
  }
  .memory-content pre.md-fence code{background:none;padding:0;}

  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:5px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--muted);}
</style>
</head>
<body>

  <div class="header">
    <div class="wordmark">SESSION ATLAS</div>
    <div class="stats" id="statsBar">loading…</div>
    <input type="text" id="searchInput" placeholder="search title or terms…" autocomplete="off" spellcheck="false">
    <div class="slider-group">
      <span>edge ≥</span>
      <input type="range" id="edgeSlider" min="0.15" max="0.60" step="0.01" value="0.30">
      <span class="val" id="edgeVal">0.30</span>
    </div>
    <button id="refreshBtn">Refresh</button>
    <div class="tabs">
      <button class="tab-btn active" data-view="chat">Chat</button>
      <button class="tab-btn" data-view="projects">Projects</button>
      <button class="tab-btn" data-view="skills">Skills</button>
      <button class="tab-btn" data-view="memory">Memory</button>
      <button class="tab-btn" data-view="tiles">Tiles</button>
      <button class="tab-btn" data-view="tree">Tree</button>
      <button class="tab-btn" data-view="graph">Graph</button>
      <button class="tab-btn" data-view="fusion">Fusion</button>
    </div>
  </div>

  <div class="main" id="main">
    <div class="view active" id="viewChat">
      <div class="chat-layout">
        <div class="chat-sidebar">
          <input type="text" id="chatSearchInput" placeholder="search sessions…" autocomplete="off" spellcheck="false">
          <button id="newSessionBtn">+ New session</button>
          <div class="new-session-panel" id="newSessionPanel" style="display:none;">
            <label>cwd (pick project)
              <select id="newSessionCwdSelect"><option value="">(pick project)</option></select>
            </label>
            <label>or type a path
              <input type="text" id="newSessionCwdInput" placeholder="C:\path\to\project" autocomplete="off" spellcheck="false">
            </label>
            <label>permission mode
              <select id="newSessionPermSelect">
                <option value="default">default</option>
                <option value="acceptEdits">acceptEdits</option>
                <option value="bypassPermissions">bypassPermissions</option>
              </select>
            </label>
          </div>
          <div class="chat-session-list" id="chatSessionList"></div>
        </div>
        <div class="chat-main">
          <div class="chat-banner" id="chatRunBanner" style="display:none;"></div>
          <div class="chat-transcript" id="chatTranscript"></div>
          <div class="chat-composer">
            <div class="skill-autocomplete" id="skillAutocomplete" style="display:none;"></div>
            <textarea id="chatComposer" rows="2" placeholder="Message… Enter to send, Shift+Enter for newline, / for skills" spellcheck="false"></textarea>
            <button id="chatSendBtn">Send</button>
          </div>
        </div>
      </div>
    </div>

    <div class="view" id="viewProjects">
      <div class="projects-grid" id="projectsGrid"></div>
    </div>

    <div class="view" id="viewSkills">
      <div class="skills-list" id="skillsList"></div>
    </div>

    <div class="view" id="viewMemory">
      <div class="memory-layout">
        <div class="memory-list" id="memoryList"></div>
        <div class="memory-content" id="memoryContent"><div class="stats" style="padding:14px;">Select a memory file.</div></div>
      </div>
    </div>

    <div class="view" id="viewTiles">
      <div class="cluster-grid" id="clusterGrid"></div>
    </div>

    <div class="view" id="viewTree">
      <div class="tree-container" id="treeContainer"></div>
    </div>

    <div class="view" id="viewGraph">
      <canvas id="graphCanvas"></canvas>
      <div class="graph-hud" id="graphHud"></div>
    </div>

    <div class="view" id="viewFusion">
      <div class="fusion-controls">
        <span>fusion ≥</span>
        <input type="range" id="fusionSlider" min="0.50" max="0.95" step="0.01" value="0.80">
        <span class="val" id="fusionVal">0.80</span>
        <span style="margin-left:auto;" id="fusionSummary"></span>
      </div>
      <div class="fusion-list" id="fusionList"></div>
    </div>

    <div class="detail-panel" id="detailPanel">
      <div class="detail-header">
        <strong>Session detail</strong>
        <div style="margin-left:auto;display:flex;gap:8px;align-items:center;">
          <button class="copy-btn" id="openInChatBtn">Open in Chat</button>
          <button class="close-btn" id="detailClose" title="Close">✕</button>
        </div>
      </div>
      <div class="detail-body" id="detailBody"></div>
    </div>
  </div>

  <div id="errorOverlay">
    <div class="error-box">
      <div id="errorMessage">Failed to load data.json</div>
      <button class="retry-btn" id="retryBtn">Retry</button>
    </div>
  </div>

<script>
(function(){
  "use strict";

  var PALETTE = [
    "#58a6ff","#3fb950","#f778ba","#d29922","#a371f7","#56d4dd",
    "#ff7b72","#7ee787","#e3b341","#79c0ff","#ffa657","#bc8cff"
  ];

  var state = {
    data: null,
    view: "chat",
    edgeThreshold: 0.30,
    fusionThreshold: 0.80,
    search: "",
    selectedIndex: null,
    clusterColor: new Map(),
    neighbors: new Map(),
    sessionByIndex: new Map(),
    projects: [],
    skills: [],
    memoryList: [],
    chat: {
      sidebarFilter: "",
      projectFilter: null,
      mode: "existing",           // "existing" | "new"
      selectedSessionId: null,
      selectedProject: null,
      newCwd: "",
      newPermissionMode: "default",
      streaming: false,
      runDisabled: false,
      currentAssistantEl: null,
      currentAssistantRaw: "",
      skillPopupOpen: false,
      skillPopupIndex: 0,
      skillPopupMatches: []
    }
  };

  // ---------- utils ----------
  function $(id){ return document.getElementById(id); }

  function escapeHtml(str){
    return String(str == null ? "" : str).replace(/[&<>"']/g, function(c){
      return ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c];
    });
  }

  function truncate(str, n){
    str = String(str == null ? "" : str);
    return str.length > n ? str.slice(0, n - 1) + "…" : str;
  }

  function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

  function fmtDateTime(iso){
    try{
      var d = new Date(iso);
      if(isNaN(d.getTime())) return String(iso);
      return d.toLocaleString();
    }catch(e){ return String(iso); }
  }

  function fmtRelative(iso){
    var t = new Date(iso).getTime();
    if(isNaN(t)) return "";
    var diff = Date.now() - t;
    var sec = Math.floor(diff / 1000);
    if(sec < 0) sec = 0;
    if(sec < 60) return "just now";
    var min = Math.floor(sec / 60);
    if(min < 60) return min + "m ago";
    var hr = Math.floor(min / 60);
    if(hr < 24) return hr + "h ago";
    var day = Math.floor(hr / 24);
    if(day < 30) return day + "d ago";
    var mo = Math.floor(day / 30);
    if(mo < 12) return mo + "mo ago";
    return Math.floor(mo / 12) + "y ago";
  }

  function fallbackCopy(text){
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try{ document.execCommand("copy"); }catch(e){}
    document.body.removeChild(ta);
  }

  function copyText(text){
    if(window.isSecureContext && navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).catch(function(){ fallbackCopy(text); });
    } else {
      fallbackCopy(text);
    }
  }

  // ---------- minimal markdown renderer: HTML-escape first, then transform ----------
  // Supports fenced code blocks, inline code, and **bold** only. Nothing else.
  function renderMarkdownMin(raw){
    var text = escapeHtml(raw);
    var blocks = [];
    text = text.replace(/```([a-zA-Z0-9_+-]*)\n?([\s\S]*?)```/g, function(_, lang, code){
      var idx = blocks.length;
      blocks.push('<pre class="md-fence"><code>' + code.replace(/\n$/, "") + "</code></pre>");
      return "@@FENCE" + idx + "@@";
    });
    text = text.replace(/`([^`\n]+)`/g, "<code>$1</code>");
    text = text.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    text = text.replace(/@@FENCE(\d+)@@/g, function(_, i){ return blocks[parseInt(i, 10)]; });
    return text;
  }

  // ---------- v2 API helpers ----------
  function apiGet(url){
    return fetch(url, {cache:"no-store"}).then(function(res){
      return res.json().catch(function(){ return {}; }).then(function(j){
        if(!res.ok) throw new Error((j && j.error) || ("HTTP " + res.status));
        return j;
      });
    });
  }

  function fetchText(url){
    return fetch(url, {cache:"no-store"}).then(function(res){
      return res.text().then(function(t){
        if(!res.ok){
          var msg = t;
          try{ var j = JSON.parse(t); msg = j.error || t; }catch(e){}
          throw new Error(msg || ("HTTP " + res.status));
        }
        return t;
      });
    });
  }

  function sessionMatches(s, q){
    if(!q) return true;
    if(s.title && s.title.toLowerCase().indexOf(q) !== -1) return true;
    var terms = s.terms || [];
    for(var i=0;i<terms.length;i++){
      if(String(terms[i]).toLowerCase().indexOf(q) !== -1) return true;
    }
    return false;
  }

  // ---------- Graph module (force-directed canvas) ----------
  var Graph = (function(){
    var canvas, ctx, dpr = 1;
    var nodes = [];
    var nodeByIndex = new Map();
    var edgesAll = [];
    var springs = [];
    var springPairs = new Set();
    var zoom = 1, offX = 0, offY = 0;
    var hovered = null, dragging = null, panning = false, dragMoved = false;
    var dragStart = {x:0,y:0}, panStart = {x:0,y:0}, offStart = {x:0,y:0};
    var warmupTicks = 0;
    var rafId = null;
    var active = false;
    var selectedNode = null;
    var FRICTION = 0.85;

    function init(){
      canvas = $("graphCanvas");
      ctx = canvas.getContext("2d");
      canvas.addEventListener("wheel", onWheel, {passive:false});
      canvas.addEventListener("mousedown", onMouseDown);
      window.addEventListener("mousemove", onMouseMove);
      window.addEventListener("mouseup", onMouseUp);
      window.addEventListener("resize", resize);
      resize();
    }

    function resize(){
      var view = $("viewGraph");
      var w = view.clientWidth || 800, h = view.clientHeight || 600;
      dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.round(w * dpr));
      canvas.height = Math.max(1, Math.round(h * dpr));
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      if(active) draw();
    }

    function setData(data){
      var oldPos = new Map();
      for(var k=0;k<nodes.length;k++){ oldPos.set(nodes[k].i, nodes[k]); }
      edgesAll = data.edges || [];
      var view = $("viewGraph");
      var w = view.clientWidth || 800, h = view.clientHeight || 600;
      nodes = (data.sessions || []).map(function(s){
        var prev = oldPos.get(s.i);
        var color = state.clusterColor.get(s.cluster) || PALETTE[Math.abs(s.cluster) % PALETTE.length];
        var r = 2 + 2 * Math.log(1 + (s.msgs || 0));
        return {
          i: s.i, id: s.id, title: s.title, cluster: s.cluster, terms: s.terms || [],
          r: r, color: color,
          x: prev ? prev.x : (w/2 + (Math.random()-0.5) * w * 0.7),
          y: prev ? prev.y : (h/2 + (Math.random()-0.5) * h * 0.7),
          vx: prev ? prev.vx : 0, vy: prev ? prev.vy : 0,
          ax: prev ? prev.ax : 0, ay: prev ? prev.ay : 0,
          tax: 0, tay: 0
        };
      });
      nodeByIndex = new Map();
      nodes.forEach(function(n){ nodeByIndex.set(n.i, n); });
      rebuildSprings();
      warmupTicks = 300;
    }

    function rebuildSprings(){
      springs = edgesAll.filter(function(e){ return e[2] >= state.edgeThreshold; });
      springPairs = new Set(springs.map(function(e){ return e[0] + "_" + e[1]; }));
      warmupTicks = Math.max(warmupTicks, 150);
    }

    function activate(){
      active = true;
      resize();
      if(!rafId) loop();
    }
    function deactivate(){
      active = false;
      if(rafId){ cancelAnimationFrame(rafId); rafId = null; }
    }

    function setSelected(i){
      selectedNode = (i == null) ? null : (nodeByIndex.get(i) || null);
      if(active) draw();
    }

    function loop(){
      if(warmupTicks > 0 || dragging){
        tick();
        if(warmupTicks > 0) warmupTicks--;
      }
      draw();
      if(active){ rafId = requestAnimationFrame(loop); } else { rafId = null; }
    }

    function tick(){
      var n = nodes.length, i, node;
      for(i=0;i<n;i++){ node = nodes[i]; node.tax = 0; node.tay = 0; }
      for(i=0;i<n;i++){
        node = nodes[i];
        if(node === dragging) continue;
        node.x += node.vx + 0.5 * node.ax;
        node.y += node.vy + 0.5 * node.ay;
      }
      var REP = 3200;
      for(var a=0;a<n;a++){
        var A = nodes[a];
        for(var b=a+1;b<n;b++){
          var B = nodes[b];
          var dx = A.x - B.x, dy = A.y - B.y;
          var d2 = dx*dx + dy*dy;
          if(d2 < 4) d2 = 4;
          var dist = Math.sqrt(d2);
          var f = REP / d2;
          var fx = (dx/dist) * f, fy = (dy/dist) * f;
          A.tax += fx; A.tay += fy;
          B.tax -= fx; B.tay -= fy;
        }
      }
      var SPRING_K = 0.02, REST = 70;
      for(var s=0;s<springs.length;s++){
        var e = springs[s];
        var A2 = nodeByIndex.get(e[0]), B2 = nodeByIndex.get(e[1]);
        if(!A2 || !B2) continue;
        var w = e[2];
        var dx2 = B2.x - A2.x, dy2 = B2.y - A2.y;
        var dist2 = Math.sqrt(dx2*dx2 + dy2*dy2);
        if(dist2 < 0.01) dist2 = 0.01;
        var rest = REST * (1 - Math.min(w, 0.9) * 0.5);
        var f2 = SPRING_K * (dist2 - rest) * (0.4 + w);
        var fx2 = (dx2/dist2) * f2, fy2 = (dy2/dist2) * f2;
        A2.tax += fx2; A2.tay += fy2;
        B2.tax -= fx2; B2.tay -= fy2;
      }
      var view = $("viewGraph");
      var cx = (view.clientWidth || 800) / 2, cy = (view.clientHeight || 600) / 2;
      var GRAV = 0.0006;
      for(i=0;i<n;i++){
        node = nodes[i];
        node.tax += (cx - node.x) * GRAV;
        node.tay += (cy - node.y) * GRAV;
      }
      for(i=0;i<n;i++){
        node = nodes[i];
        if(node === dragging){ node.vx=0; node.vy=0; node.ax=0; node.ay=0; continue; }
        node.vx = (node.vx + 0.5 * (node.ax + node.tax)) * FRICTION;
        node.vy = (node.vy + 0.5 * (node.ay + node.tay)) * FRICTION;
        node.ax = node.tax; node.ay = node.tay;
      }
    }

    function screenToWorld(x, y){ return [ (x - offX) / zoom, (y - offY) / zoom ]; }

    function nodeMatchesSearch(node, q){
      if(!q) return true;
      if(node.title && node.title.toLowerCase().indexOf(q) !== -1) return true;
      for(var i=0;i<node.terms.length;i++){
        if(String(node.terms[i]).toLowerCase().indexOf(q) !== -1) return true;
      }
      return false;
    }

    function draw(){
      if(!ctx) return;
      var w = canvas.width / dpr, h = canvas.height / dpr;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#0d1117";
      ctx.fillRect(0, 0, w, h);

      var q = (state.search || "").trim().toLowerCase();
      var searchActive = q.length > 0;

      var highlightSet = null;
      if(hovered){
        highlightSet = new Set();
        highlightSet.add(hovered.i);
        for(var si=0; si<springs.length; si++){
          var e = springs[si];
          if(e[0] === hovered.i) highlightSet.add(e[1]);
          else if(e[1] === hovered.i) highlightSet.add(e[0]);
        }
      }

      ctx.save();
      ctx.translate(offX, offY);
      ctx.scale(zoom, zoom);

      // edges
      for(var k=0;k<springs.length;k++){
        var edge = springs[k];
        var A = nodeByIndex.get(edge[0]), B = nodeByIndex.get(edge[1]);
        if(!A || !B) continue;
        var ew = edge[2];
        var alpha = 0.2 + ew * 0.5;
        if(highlightSet){
          var isHL = highlightSet.has(edge[0]) && highlightSet.has(edge[1]) &&
                     (edge[0] === hovered.i || edge[1] === hovered.i);
          alpha = isHL ? Math.min(1, alpha + 0.35) : alpha * 0.15;
        }
        ctx.strokeStyle = "rgba(88,166,255," + alpha.toFixed(3) + ")";
        ctx.lineWidth = 1 / zoom;
        ctx.beginPath();
        ctx.moveTo(A.x, A.y);
        ctx.lineTo(B.x, B.y);
        ctx.stroke();
      }

      // nodes
      for(var ni=0; ni<nodes.length; ni++){
        var node = nodes[ni];
        var matches = nodeMatchesSearch(node, q);
        var alpha2 = 1;
        if(highlightSet && !highlightSet.has(node.i)) alpha2 = 0.15;
        if(searchActive && !matches) alpha2 = Math.min(alpha2, 0.15);

        ctx.globalAlpha = alpha2;
        ctx.beginPath();
        ctx.arc(node.x, node.y, node.r, 0, Math.PI * 2);
        ctx.fillStyle = node.color;
        ctx.fill();
        if(selectedNode && node.i === selectedNode.i){
          ctx.lineWidth = 2 / zoom;
          ctx.strokeStyle = "#ffffff";
          ctx.stroke();
        }
        ctx.globalAlpha = 1;

        var forceLabel = (highlightSet && highlightSet.has(node.i)) || (searchActive && matches && zoom > 0.7);
        var showLabel = zoom > 1.6 || forceLabel;
        if(showLabel){
          ctx.globalAlpha = alpha2;
          ctx.fillStyle = "#c9d1d9";
          ctx.font = (12 / zoom) + "px sans-serif";
          ctx.fillText(truncate(node.title, 30), node.x + node.r + 4, node.y + 4);
          ctx.globalAlpha = 1;
        }
      }

      ctx.restore();
      updateHud();
    }

    function updateHud(){
      var el = $("graphHud");
      if(!el) return;
      el.textContent = nodes.length + " nodes · " + springs.length + " edges ≥ " +
        state.edgeThreshold.toFixed(2) + " · zoom " + zoom.toFixed(2) + "×";
    }

    function hitTest(mx, my){
      var wp = screenToWorld(mx, my);
      var wx = wp[0], wy = wp[1];
      var best = null, bestD = Infinity;
      var pad = Math.max(3, 4 / zoom);
      for(var i=0;i<nodes.length;i++){
        var node = nodes[i];
        var dx = node.x - wx, dy = node.y - wy;
        var d = Math.sqrt(dx*dx + dy*dy);
        if(d <= node.r + pad && d < bestD){ best = node; bestD = d; }
      }
      return best;
    }

    function onWheel(ev){
      ev.preventDefault();
      var rect = canvas.getBoundingClientRect();
      var mx = ev.clientX - rect.left, my = ev.clientY - rect.top;
      var wp = screenToWorld(mx, my);
      var factor = ev.deltaY < 0 ? 1.12 : 1/1.12;
      var newZoom = clamp(zoom * factor, 0.15, 6);
      offX = mx - wp[0] * newZoom;
      offY = my - wp[1] * newZoom;
      zoom = newZoom;
      draw();
    }

    function onMouseDown(ev){
      if(!active) return;
      if(ev.button !== 0) return;
      var rect = canvas.getBoundingClientRect();
      var mx = ev.clientX - rect.left, my = ev.clientY - rect.top;
      var hit = hitTest(mx, my);
      dragStart = {x:mx, y:my};
      dragMoved = false;
      if(hit){
        dragging = hit;
        canvas.classList.add("dragging");
      } else {
        panning = true;
        panStart = {x:mx, y:my};
        offStart = {x:offX, y:offY};
        canvas.classList.add("dragging");
      }
    }

    function onMouseMove(ev){
      if(!active && !dragging && !panning) return;
      var rect = canvas.getBoundingClientRect();
      var mx = ev.clientX - rect.left, my = ev.clientY - rect.top;

      if(dragging){
        var wp = screenToWorld(mx, my);
        dragging.x = wp[0]; dragging.y = wp[1];
        if(Math.hypot(mx - dragStart.x, my - dragStart.y) > 4) dragMoved = true;
        warmupTicks = Math.max(warmupTicks, 2);
        draw();
        return;
      }
      if(panning){
        offX = offStart.x + (mx - panStart.x);
        offY = offStart.y + (my - panStart.y);
        if(Math.hypot(mx - dragStart.x, my - dragStart.y) > 4) dragMoved = true;
        draw();
        return;
      }
      if(!active) return;
      var inBounds = mx >= 0 && my >= 0 && mx <= rect.width && my <= rect.height;
      var hit = inBounds ? hitTest(mx, my) : null;
      if(hit !== hovered){ hovered = hit; draw(); }
    }

    function onMouseUp(){
      if(dragging){
        var node = dragging;
        var wasClick = !dragMoved;
        dragging = null;
        canvas.classList.remove("dragging");
        warmupTicks = Math.max(warmupTicks, 120);
        if(wasClick) openDetail(node.i);
      } else if(panning){
        panning = false;
        canvas.classList.remove("dragging");
      }
    }

    return {
      init: init, setData: setData, activate: activate, deactivate: deactivate,
      rebuildSprings: rebuildSprings, setSelected: setSelected
    };
  })();

  // ---------- data loading ----------
  function buildIndices(){
    var d = state.data;
    state.clusterColor = new Map();
    (d.clusters || []).forEach(function(c, idx){
      state.clusterColor.set(c.id, PALETTE[idx % PALETTE.length]);
    });
    state.neighbors = new Map();
    state.sessionByIndex = new Map();
    (d.sessions || []).forEach(function(s){
      state.neighbors.set(s.i, []);
      state.sessionByIndex.set(s.i, s);
    });
    (d.edges || []).forEach(function(e){
      var a = e[0], b = e[1], w = e[2];
      if(state.neighbors.has(a)) state.neighbors.get(a).push({i:b, w:w});
      if(state.neighbors.has(b)) state.neighbors.get(b).push({i:a, w:w});
    });
    state.neighbors.forEach(function(arr){ arr.sort(function(x,y){ return y.w - x.w; }); });
  }

  function loadData(){
    return fetch("/data.json", {cache:"no-store"}).then(function(res){
      if(!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    }).then(function(json){
      if(!json || !Array.isArray(json.sessions)) throw new Error("malformed data.json");
      if(json.sessions.length === 0){
        state.data = json;
        buildIndices();
        showError("No sessions indexed yet. Run the indexer, then Retry.");
        renderStats();
        return;
      }
      state.data = json;
      buildIndices();
      hideError();
      renderAll();
    }).catch(function(err){
      showError("Failed to load data.json — " + err.message);
    });
  }

  function renderAll(){
    renderStats();
    renderTiles();
    renderTree();
    renderFusion();
    renderChatSidebar();
    Graph.setData(state.data);
  }

  function renderStats(){
    var d = state.data;
    if(!d){ $("statsBar").textContent = ""; return; }
    $("statsBar").textContent = d.sessions.length + " sessions · " + d.clusters.length +
      " clusters · generated " + fmtRelative(d.generated);
  }

  function showError(msg){
    $("errorMessage").textContent = msg;
    $("errorOverlay").classList.add("show");
  }
  function hideError(){ $("errorOverlay").classList.remove("show"); }

  // ---------- Tiles ----------
  function renderTiles(){
    var grid = $("clusterGrid");
    if(!state.data){ grid.innerHTML = ""; return; }
    var q = state.search.trim().toLowerCase();
    var html = "";
    var sessions = state.data.sessions;
    state.data.clusters.forEach(function(c){
      var members = sessions.filter(function(s){ return s.cluster === c.id; });
      var visible = q ? members.filter(function(s){ return sessionMatches(s, q); }) : members;
      if(q && visible.length === 0) return;
      var color = state.clusterColor.get(c.id) || "#888";
      var chips = visible.map(function(s){
        return '<div class="chip" data-i="' + s.i + '" title="' + escapeHtml(s.title) + '">' +
          escapeHtml(truncate(s.title, 42)) +
          '<span class="chip-time">' + fmtRelative(s.mtime) + "</span></div>";
      }).join("");
      html += '<div class="cluster-card">' +
        '<div class="cluster-card-header"><span class="cluster-dot" style="background:' + color + '"></span>' +
        "<span>" + escapeHtml(c.label) + "</span>" +
        '<span class="badge">' + c.size + "</span></div>" +
        '<div class="chip-list">' + chips + "</div></div>";
    });
    grid.innerHTML = html || '<div class="stats" style="padding:10px;">No matches.</div>';
    grid.querySelectorAll(".chip").forEach(function(el){
      el.addEventListener("click", function(){ openDetail(parseInt(el.dataset.i, 10)); });
    });
  }

  // ---------- Tree ----------
  function renderTree(){
    var container = $("treeContainer");
    if(!state.data){ container.innerHTML = ""; return; }
    var q = state.search.trim().toLowerCase();
    var clusterLabel = new Map();
    state.data.clusters.forEach(function(c){ clusterLabel.set(c.id, c.label); });

    var byProject = new Map();
    state.data.sessions.forEach(function(s){
      if(q && !sessionMatches(s, q)) return;
      if(!byProject.has(s.project)){
        byProject.set(s.project, {label: s.projectLabel || s.project, clusters: new Map()});
      }
      var proj = byProject.get(s.project);
      if(!proj.clusters.has(s.cluster)) proj.clusters.set(s.cluster, []);
      proj.clusters.get(s.cluster).push(s);
    });

    var html = "";
    byProject.forEach(function(proj, projKey){
      var total = 0;
      proj.clusters.forEach(function(arr){ total += arr.length; });
      html += "<details open><summary>" + escapeHtml(proj.label) +
        ' <span class="badge">' + total + "</span></summary>";
      proj.clusters.forEach(function(sessArr, cid){
        var color = state.clusterColor.get(cid) || "#888";
        html += '<details open style="margin-left:18px;"><summary>' +
          '<span class="cluster-dot" style="background:' + color + ';display:inline-block;margin-right:6px;vertical-align:middle;"></span>' +
          escapeHtml(clusterLabel.get(cid) || ("cluster " + cid)) +
          ' <span class="badge">' + sessArr.length + "</span></summary>";
        sessArr.forEach(function(s){
          html += '<div class="tree-session" data-i="' + s.i + '"><span>' +
            escapeHtml(truncate(s.title, 64)) + '</span><span class="chip-time">' +
            fmtRelative(s.mtime) + "</span></div>";
        });
        html += "</details>";
      });
      html += "</details>";
    });

    container.innerHTML = html || '<div class="stats" style="padding:10px;">No matches.</div>';
    container.querySelectorAll(".tree-session").forEach(function(el){
      el.addEventListener("click", function(){ openDetail(parseInt(el.dataset.i, 10)); });
    });
  }

  // ---------- Chat ----------
  var composerEl = null; // set during wiring

  function renderChatSidebar(){
    var el = $("chatSessionList");
    if(!el) return;
    if(!state.data){ el.innerHTML = ""; return; }
    var q = (state.chat.sidebarFilter || "").trim().toLowerCase();
    var projectFilter = state.chat.projectFilter;
    var clusterLabel = new Map();
    var clusterSize = new Map();
    state.data.clusters.forEach(function(c){ clusterLabel.set(c.id, c.label); clusterSize.set(c.id, c.size); });

    var byCluster = new Map();
    state.data.sessions.forEach(function(s){
      if(projectFilter && s.project !== projectFilter) return;
      if(q && !sessionMatches(s, q)) return;
      if(!byCluster.has(s.cluster)) byCluster.set(s.cluster, []);
      byCluster.get(s.cluster).push(s);
    });

    var clusterIds = Array.from(byCluster.keys()).sort(function(a, b){
      return (clusterSize.get(b) || 0) - (clusterSize.get(a) || 0);
    });

    var html = "";
    if(projectFilter){
      html += '<div class="chat-filter-banner"><span>project: ' + escapeHtml(projectFilter) +
        '</span><button id="clearProjectFilter" class="copy-btn">clear</button></div>';
    }
    clusterIds.forEach(function(cid){
      var members = byCluster.get(cid).slice().sort(function(a, b){
        return new Date(b.mtime).getTime() - new Date(a.mtime).getTime();
      });
      var color = state.clusterColor.get(cid) || "#888";
      html += '<div class="chat-cluster-group">' +
        '<div class="chat-cluster-header"><span class="cluster-dot" style="background:' + color + '"></span>' +
        escapeHtml(clusterLabel.get(cid) || ("cluster " + cid)) +
        ' <span class="badge">' + members.length + "</span></div>";
      members.forEach(function(s){
        var active = (state.chat.mode === "existing" && state.chat.selectedSessionId === s.id) ? " active" : "";
        html += '<div class="chat-session-item' + active + '" data-id="' + escapeHtml(s.id) +

  function handleChatEvent(obj){
    if(!obj || !obj.type) return;
    if(obj.type === "system" && obj.subtype === "init"){
      if(state.chat.mode === "new" && obj.session_id){
        state.chat.mode = "existing";
        state.chat.selectedSessionId = obj.session_id;
        hideNewSessionPanel();
        appendSystemLine("session " + obj.session_id.slice(0, 8) + " started");
      }
      return;
    }
    if(obj.type === "assistant"){
      var blocks = (obj.message && Array.isArray(obj.message.content)) ? obj.message.content : [];
      var text = blocks.filter(function(b){ return b && b.type === "text" && typeof b.text === "string"; })
        .map(function(b){ return b.text; }).join("");
      if(text) appendAssistantTextDelta(text);
      return;
    }
    if(obj.type === "result"){
      state.chat.currentAssistantEl = null;
      state.chat.currentAssistantRaw = "";
      if(obj.is_error){
        appendSystemLine("Turn ended with error: " + (obj.result || obj.subtype || "unknown"));
      }
      return;
    }
    if(obj.type === "atlas_done"){
      setComposerBusy(false);
      refreshSidebarAfterChat();
      return;
    }
    // hook_started / hook_response / other system events: ignored silently
  }

  function streamSSE(body){
    var reader = body.getReader();
    var decoder = new TextDecoder();
    var buffer = "";
    function pump(){
      return reader.read().then(function(result){
        if(result.done){
          setComposerBusy(false);
          return;
        }
        buffer += decoder.decode(result.value, {stream: true});
        var events = buffer.split("\n\n");
        buffer = events.pop();
        events.forEach(function(evt){
          evt.split("\n").forEach(function(line){
            line = line.trim();
            if(line.indexOf("data:") === 0){
              var jsonStr = line.slice(5).trim();
              if(!jsonStr) return;
              try{ handleChatEvent(JSON.parse(jsonStr)); }catch(e){ /* ignore malformed line */ }
            }
          });
        });
        return pump();
      });
    }
    return pump().catch(function(err){
      appendSystemLine("Stream error: " + err.message);
      setComposerBusy(false);
    });
  }

  function sendComposer(){
    if(state.chat.streaming || state.chat.runDisabled) return;
    var text = composerEl.value;
    if(!text.trim()) return;
    var resumeId = state.chat.mode === "existing" ? state.chat.selectedSessionId : null;
    var payload = {
      prompt: text,
      resume: resumeId,
      cwd: state.chat.newCwd || null,
      permissionMode: state.chat.newPermissionMode || "default"
    };
    appendUserBubbleLive(text);
    composerEl.value = "";
    closeSkillPopup();
    setComposerBusy(true);
    state.chat.currentAssistantEl = null;
    state.chat.currentAssistantRaw = "";

    fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    }).then(function(res){
      if(res.status === 403){
        return res.json().catch(function(){ return {}; }).then(function(j){
          showRunDisabledBanner(j.error);
          setComposerBusy(false);
          throw new Error("__handled__");
        });
      }
      if(res.status === 429){
        appendSystemLine("Too many concurrent chat sessions (max 3) — try again shortly.");
        setComposerBusy(false);
        throw new Error("__handled__");
      }
      if(!res.ok || !res.body){
        return res.json().catch(function(){ return {}; }).then(function(j){
          throw new Error((j && j.error) || ("HTTP " + res.status));
        });
      }
      return streamSSE(res.body);
    }).catch(function(err){
      if(err.message !== "__handled__"){
        appendSystemLine("Error: " + err.message);
      }
      setComposerBusy(false);
    });
  }

  // ---------- Fusion ----------
  function computeFusionGroups(){
    var d = state.data;
    var parent = new Map();
    d.sessions.forEach(function(s){ parent.set(s.i, s.i); });
    function find(x){
      while(parent.get(x) !== x){
        parent.set(x, parent.get(parent.get(x)));
        x = parent.get(x);
      }
      return x;
    }
    function union(a, b){
      var ra = find(a), rb = find(b);
      if(ra !== rb) parent.set(ra, rb);
    }
    d.edges.forEach(function(e){
      if(e[2] >= state.fusionThreshold) union(e[0], e[1]);
    });
    var groups = new Map();
    d.sessions.forEach(function(s){
      var r = find(s.i);
      if(!groups.has(r)) groups.set(r, []);
      groups.get(r).push(s);
    });
    var result = [];
    groups.forEach(function(g){ if(g.length > 1) result.push(g); });
    result.sort(function(a,b){ return b.length - a.length; });
    return result;
  }

  function renderFusion(){
    var listEl = $("fusionList");
    if(!state.data){ listEl.innerHTML = ""; return; }
    var q = state.search.trim().toLowerCase();
    var groups = computeFusionGroups();
    var visibleGroups = q ? groups.filter(function(g){
      return g.some(function(s){ return sessionMatches(s, q); });
    }) : groups;

    $("fusionSummary").textContent = visibleGroups.length + " candidate group" + (visibleGroups.length === 1 ? "" : "s");

    if(visibleGroups.length === 0){
      listEl.innerHTML = '<div class="stats" style="padding:10px;">No fusion candidates at this threshold' +
        (q ? " matching search." : ".") + "</div>";
      return;
    }

    var html = "";
    visibleGroups.forEach(function(g, idx){
      var termFreq = new Map();
      g.forEach(function(s){
        (s.terms || []).forEach(function(t){ termFreq.set(t, (termFreq.get(t) || 0) + 1); });
      });
      var sharedTerms = Array.from(termFreq.entries())
        .sort(function(a,b){ return b[1] - a[1]; })
        .slice(0, 5).map(function(e){ return e[0]; });
      var ids = g.map(function(s){ return s.id; });
      var membersHtml = g.map(function(s){
        return '<div class="fusion-member" data-i="' + s.i + '"><span>' +
          escapeHtml(truncate(s.title, 52)) + '</span><span class="chip-time">' +
          fmtRelative(s.mtime) + "</span></div>";
      }).join("");
      var termsHtml = sharedTerms.map(function(t){
        return '<span class="term-tag">' + escapeHtml(t) + "</span>";
      }).join(" ") || "—";

      html += '<div class="fusion-group">' +
        '<div class="cluster-card-header"><span>Group ' + (idx+1) + '</span>' +
        '<span class="badge">' + g.length + " sessions</span></div>" +
        '<div class="fusion-members">' + membersHtml + "</div>" +
        '<div class="detail-label">shared terms</div><div>' + termsHtml + "</div>" +
        '<div class="proposal-box">Same topic — candidates to merge/compact.' +
        '<div style="margin-top:6px;"><button class="copy-btn" data-ids="' +
        escapeHtml(ids.join(",")) + '">Copy id list</button></div></div>' +
        "</div>";
    });

    listEl.innerHTML = html;
    listEl.querySelectorAll(".fusion-member").forEach(function(el){
      el.addEventListener("click", function(){ openDetail(parseInt(el.dataset.i, 10)); });
    });
    listEl.querySelectorAll(".copy-btn[data-ids]").forEach(function(el){
      el.addEventListener("click", function(){ copyText(el.dataset.ids); });
    });
  }

      acceptSkillSuggestion();
      return;
    }
    if(ev.key === "Enter" && !ev.shiftKey){
      ev.preventDefault();
      if(state.chat.skillPopupOpen){
        acceptSkillSuggestion();
      } else {
        sendComposer();
      }
      return;
    }
    if(ev.key === "Escape" && state.chat.skillPopupOpen){
      closeSkillPopup();
    }
  });

  $("searchInput").addEventListener("input", function(){
    state.search = $("searchInput").value;
    renderTiles();
    renderTree();
    renderFusion();
  });

  $("edgeSlider").addEventListener("input", function(){
    state.edgeThreshold = parseFloat($("edgeSlider").value);
    $("edgeVal").textContent = state.edgeThreshold.toFixed(2);
    if(state.data) Graph.rebuildSprings();
  });

  $("fusionSlider").addEventListener("input", function(){
    state.fusionThreshold = parseFloat($("fusionSlider").value);
    $("fusionVal").textContent = state.fusionThreshold.toFixed(2);
    if(state.data) renderFusion();
  });

  $("refreshBtn").addEventListener("click", function(){
    var btn = $("refreshBtn");
    var orig = btn.textContent;
    btn.disabled = true;
    btn.textContent = "Refreshing…";
    fetch("/refresh", {method:"POST"}).then(function(res){
      return res.json().catch(function(){ return {}; }).then(function(j){
        if(!res.ok || j.ok === false) throw new Error(j.error || ("HTTP " + res.status));
        return loadData();
      });
    }).catch(function(err){
      showError("Refresh failed — " + err.message);
    }).finally(function(){
      btn.disabled = false;
      btn.textContent = orig;
    });
  });

  $("retryBtn").addEventListener("click", function(){
    hideError();
    loadData();
  });

  $("detailClose").addEventListener("click", closeDetail);

  document.addEventListener("keydown", function(ev){
    if(ev.key === "Escape") closeDetail();
  });

  // ---------- init ----------
  Graph.init();
  loadData();
  loadProjects();
  loadSkills();
  loadMemoryList();

})();
</script>
</body>
</html>
